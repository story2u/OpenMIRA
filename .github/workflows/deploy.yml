          append_env REVENUECAT_RECONCILE_ENABLED "true"
          set_env NEXT_PUBLIC_REVENUECAT_WEB_API_KEY "$RUNTIME_NEXT_PUBLIC_REVENUECAT_WEB_API_KEY"
          set_env NEXT_PUBLIC_REVENUECAT_OFFERING_ID "$RUNTIME_NEXT_PUBLIC_REVENUECAT_OFFERING_ID"
          append_env CLOUDFLARE_TUNNEL_TOKEN "$CLOUDFLARE_TUNNEL_TOKEN"

          ssh -i ~/.ssh/vps_deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "mkdir -p '$VPS_DEPLOY_DIR'"
          scp -i ~/.ssh/vps_deploy_key -P "$VPS_PORT" \
            backend/docker-compose.prod.yml \
            backend/.env.example \
            "$VPS_USER@$VPS_HOST:$VPS_DEPLOY_DIR/"
          scp -i ~/.ssh/vps_deploy_key -P "$VPS_PORT" "$env_updates" "$VPS_USER@$VPS_HOST:$VPS_DEPLOY_DIR/.env.incoming"
          ssh -i ~/.ssh/vps_deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "DEPLOY_DIR=$(quote "$VPS_DEPLOY_DIR") bash -s" <<'REMOTE'
          set -euo pipefail

          cd "$DEPLOY_DIR"
          mv docker-compose.prod.yml docker-compose.yml
          python3 - <<'PY'
          import secrets
          from pathlib import Path

          def env_key(line: str) -> str | None:
              stripped = line.strip()
              if not stripped or stripped.startswith("#") or "=" not in stripped:
                  return None
              return stripped.split("=", 1)[0].strip()

          base_path = Path(".env")
          incoming_path = Path(".env.incoming")
          lines: list[str] = []
          positions: dict[str, int] = {}

          if base_path.exists():
              for line in base_path.read_text().splitlines():
                  key = env_key(line)
                  if key and key not in positions:
                      positions[key] = len(lines)
                  lines.append(line)

          for line in incoming_path.read_text().splitlines():
              key = env_key(line)
              if not key:
                  continue
              if key in positions:
                  lines[positions[key]] = line
              else:
                  positions[key] = len(lines)
                  lines.append(line)

          def raw_value(key: str) -> str:
              if key not in positions:
                  return ""
              value = lines[positions[key]].split("=", 1)[1].strip()
              if (value.startswith('"') and value.endswith('"')) or (value.startswith("'") and value.endswith("'")):
                  value = value[1:-1]
              return value.strip()

          def upsert(key: str, line: str) -> None:
              if key in positions:
                  lines[positions[key]] = line
                  return
              positions[key] = len(lines)
              lines.append(line)

          if raw_value("JWT_SECRET_KEY") in {"", "change-me", "change-me-with-a-long-random-string"}:
              upsert("JWT_SECRET_KEY", f'JWT_SECRET_KEY="{secrets.token_urlsafe(48)}"')

          if raw_value("TELEGRAM_WEBHOOK_SECRET") in {"", "change-me"}:
              upsert(
                  "TELEGRAM_WEBHOOK_SECRET",
                  f'TELEGRAM_WEBHOOK_SECRET="{secrets.token_urlsafe(32)}"',
              )

          base_path.write_text("\n".join(lines).rstrip() + "\n")
          incoming_path.unlink(missing_ok=True)
          PY
          chmod 600 .env
          REMOTE
          rm -f "$env_updates"

      - name: Deploy services
        run: |
          set -euo pipefail
          quote() {
            printf "%q" "$1"
          }
          remote_env=(
            "DEPLOY_DIR=$(quote "$VPS_DEPLOY_DIR")"
            "VERSION=$(quote "$DEPLOY_VERSION")"
            "ENVIRONMENT=$(quote "$DEPLOY_ENVIRONMENT")"
            "REGISTRY=$(quote "$REGISTRY")"
            "IMAGE_NAMESPACE=$(quote "$IMAGE_NAMESPACE")"
            "GHCR_USERNAME=$(quote "$GHCR_USERNAME")"
            "GHCR_TOKEN=$(quote "$GHCR_TOKEN")"
            "COMPOSE_SERVICES=$(quote "$VPS_COMPOSE_SERVICES")"
            "CLOUDFLARE_TUNNEL_TOKEN=$(quote "$CLOUDFLARE_TUNNEL_TOKEN")"
          )
          ssh -i ~/.ssh/vps_deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "${remote_env[*]} bash -s" <<'REMOTE'
          set -euo pipefail

          cd "$DEPLOY_DIR"
          echo "Deploying ${VERSION} to ${ENVIRONMENT}..."

          case " $COMPOSE_SERVICES " in
            *" wecom_archive_worker "*) ;;
            *) COMPOSE_SERVICES="$COMPOSE_SERVICES wecom_archive_worker" ;;
          esac

          if [ ! -f .env ]; then
            cp .env.example .env
            echo "Created $DEPLOY_DIR/.env from .env.example. Replace change-me values before exposing traffic."
          fi

          if ! docker compose version >/dev/null 2>&1; then
            echo "docker compose is required on the VPS"
            exit 1
          fi

          if [ -n "$GHCR_TOKEN" ]; then
            printf '%s' "$GHCR_TOKEN" | docker login "$REGISTRY" -u "$GHCR_USERNAME" --password-stdin >/dev/null
          fi

          export BACKEND_IMAGE="$REGISTRY/$IMAGE_NAMESPACE/im-backend:$VERSION"
          export FRONTEND_IMAGE="$REGISTRY/$IMAGE_NAMESPACE/im-frontend:$VERSION"
          export CLOUDFLARE_TUNNEL_TOKEN

          docker compose --env-file .env config >/dev/null

          wait_for_health() {
            service="$1"
            container_id="$(docker compose --env-file .env ps -q "$service" || true)"
            if [ -z "$container_id" ]; then
              return 0
            fi
            status="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$container_id")"
            if [ "$status" = "none" ]; then
              return 0
            fi
            for _ in $(seq 1 60); do
              status="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$container_id")"
              if [ "$status" = "healthy" ]; then
                return 0
              fi
              sleep 2
            done
            echo "$service did not become healthy"
            docker compose --env-file .env logs --tail=80 "$service"
            exit 1
          }

          echo "Pulling images for: $COMPOSE_SERVICES"
          docker compose --env-file .env pull $COMPOSE_SERVICES

          stateful_services=""
          runtime_services=""
          database_client_services=""
          run_migrate=false
          for service in $COMPOSE_SERVICES; do
            case "$service" in
              migrate)
                run_migrate=true
                ;;
              postgres|redis)
                stateful_services="$stateful_services $service"
                ;;
              *)
                runtime_services="$runtime_services $service"
                case "$service" in
                  api|celery_worker|celery_beat|wecom_archive_worker|telegram_listener|telegram_mtproto_qr_worker|telegram_mtproto_listener)
                    database_client_services="$database_client_services $service"
                    ;;
                esac
                ;;
            esac
          done

          if [ -n "$stateful_services" ]; then
            echo "Starting stateful services:$stateful_services"
            docker compose --env-file .env up -d $stateful_services
            for service in $stateful_services; do
              wait_for_health "$service"
            done
          fi

          if [ "$run_migrate" = "true" ]; then
            if [ -n "$database_client_services" ]; then
              echo "Stopping database clients before migrations:$database_client_services"
              docker compose --env-file .env stop $database_client_services
            fi
            echo "Running database migrations..."
            docker compose --env-file .env rm -f migrate >/dev/null 2>&1 || true
            docker compose --env-file .env up --no-deps --force-recreate --exit-code-from migrate migrate
          fi

          if [ -n "$runtime_services" ]; then
            echo "Starting runtime services:$runtime_services"
            docker compose --env-file .env up -d --remove-orphans --no-deps --force-recreate $runtime_services
          fi

          api_container="$(docker compose --env-file .env ps -q api || true)"
          if [ -n "$api_container" ]; then
            docker compose --env-file .env exec -T api python -m scripts.register_telegram_webhook
          fi

          echo "Cleaning up dangling images..."
          docker image prune -f

          echo "Deployment complete."
          docker compose --env-file .env ps
          REMOTE

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    timeout-minutes: 5
    env:
      VPS_API_URL: ${{ vars.VPS_API_URL || secrets.VPS_API_URL }}
      VPS_FRONTEND_URL: ${{ vars.VPS_FRONTEND_URL || secrets.VPS_FRONTEND_URL }}
    steps:
      - name: Wait for services
        run: sleep 30

      - name: Check API health
        run: |
          set -euo pipefail
          if [ -z "$VPS_API_URL" ]; then
            echo "VPS_API_URL is not set; skipping API health check"
            exit 0
          fi
          curl -fsS "$VPS_API_URL/healthz"
          echo "API health check passed"

      - name: Check frontend health
        run: |
          set -euo pipefail
          if [ -z "$VPS_FRONTEND_URL" ]; then
            echo "VPS_FRONTEND_URL is not set; skipping frontend health check"
            exit 0
          fi
          curl -fsS "$VPS_FRONTEND_URL"
          echo "Frontend health check passed"
