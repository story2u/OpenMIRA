name: Deploy to VPS

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      version:
        description: 'Version to deploy (branch, tag, or SHA)'
        required: false
        default: ''
  workflow_run:
    workflows: ['Docker Build & Push']
    types: [completed]
    branches: [main, master]

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    environment: ${{ inputs.environment || 'production' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            
            # Configuration
            DEPLOY_DIR="${{ secrets.VPS_DEPLOY_DIR || '/opt/wework' }}"
            VERSION="${{ inputs.version || 'latest' }}"
            ENVIRONMENT="${{ inputs.environment || 'production' }}"
            
            echo "Deploying version $VERSION to $ENVIRONMENT..."
            
            # Create deploy directory if not exists
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"
            
            # Pull latest docker-compose if exists
            if [ -f "docker-compose.yml" ]; then
              echo "Pulling latest images..."
              docker compose pull
            
              echo "Starting services..."
              docker compose up -d --remove-orphans
            
              echo "Cleaning up old images..."
              docker image prune -f
            else
              echo "No docker-compose.yml found in $DEPLOY_DIR"
              echo "Please ensure the deployment directory is properly configured."
              exit 1
            fi
            
            echo "Deployment complete!"
            docker compose ps

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for services
        run: sleep 30

      - name: Check API health
        run: |
          curl -f ${{ secrets.VPS_API_URL }}/healthz || exit 1
          echo "API health check passed"

      - name: Check Web health
        run: |
          curl -f ${{ secrets.VPS_WEB_URL }} || exit 1
          echo "Web health check passed"
