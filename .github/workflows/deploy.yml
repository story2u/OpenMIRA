name: Deploy to VPS

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      version:
        description: 'Version to deploy (branch, tag, or SHA)'
        required: false
        default: ''
  workflow_run:
    workflows: ['Docker Build & Push']
    types: [completed]
    branches: [main, master]

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    environment: ${{ inputs.environment || 'production' }}
    env:
      VPS_HOST: ${{ vars.VPS_HOST || secrets.VPS_HOST }}
      VPS_USER: ${{ vars.VPS_USER || secrets.VPS_USER }}
      VPS_PORT: ${{ vars.VPS_PORT || secrets.VPS_PORT || '22' }}
      VPS_DEPLOY_DIR: ${{ vars.VPS_DEPLOY_DIR || secrets.VPS_DEPLOY_DIR || '/opt/wework' }}
      VPS_COMPOSE_SERVICES: ${{ vars.VPS_COMPOSE_SERVICES || 'go-postgres go-redis go-cache-redis go-api go-web go-incoming-worker' }}
      DEPLOY_VERSION: ${{ inputs.version || github.event.workflow_run.head_branch || github.ref_name || 'main' }}
      DEPLOY_ENVIRONMENT: ${{ inputs.environment || 'production' }}
      GHCR_USERNAME: ${{ vars.GHCR_USERNAME || github.actor }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate VPS configuration
        run: |
          set -euo pipefail
          test -n "$VPS_HOST" || { echo "VPS_HOST is required"; exit 1; }
          test -n "$VPS_USER" || { echo "VPS_USER is required"; exit 1; }
          test -n "${VPS_SSH_KEY:-}" || { echo "VPS_SSH_KEY secret is required"; exit 1; }
          case "$VPS_DEPLOY_DIR" in
            *"'"*) echo "VPS_DEPLOY_DIR must not contain single quotes"; exit 1 ;;
          esac
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

      - name: Prepare SSH key
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/vps_deploy_key
          chmod 600 ~/.ssh/vps_deploy_key
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

      - name: Sync compose files
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/vps_deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "mkdir -p '$VPS_DEPLOY_DIR'"
          scp -i ~/.ssh/vps_deploy_key -P "$VPS_PORT" \
            deploy/docker-compose.yml \
            deploy/.env.example \
            "$VPS_USER@$VPS_HOST:$VPS_DEPLOY_DIR/"
          if [ -n "${VPS_ENV_FILE:-}" ]; then
            env_file="$(mktemp)"
            printf '%s\n' "$VPS_ENV_FILE" > "$env_file"
            scp -i ~/.ssh/vps_deploy_key -P "$VPS_PORT" "$env_file" "$VPS_USER@$VPS_HOST:$VPS_DEPLOY_DIR/.env"
            rm -f "$env_file"
          fi
        env:
          VPS_ENV_FILE: ${{ secrets.VPS_ENV_FILE }}

      - name: Deploy Docker services
        run: |
          set -euo pipefail
          quote() {
            printf "%q" "$1"
          }
          remote_env=(
            "DEPLOY_DIR=$(quote "$VPS_DEPLOY_DIR")"
            "VERSION=$(quote "$DEPLOY_VERSION")"
            "ENVIRONMENT=$(quote "$DEPLOY_ENVIRONMENT")"
            "REGISTRY=$(quote "$REGISTRY")"
            "IMAGE_PREFIX=$(quote "$IMAGE_PREFIX")"
            "GHCR_USERNAME=$(quote "$GHCR_USERNAME")"
            "GHCR_TOKEN=$(quote "$GHCR_TOKEN")"
            "COMPOSE_SERVICES=$(quote "$VPS_COMPOSE_SERVICES")"
          )
          ssh -i ~/.ssh/vps_deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "${remote_env[*]} bash -s" <<'REMOTE'
          set -euo pipefail

          echo "Deploying version ${VERSION} to ${ENVIRONMENT}..."
          cd "$DEPLOY_DIR"

          if [ ! -f .env ]; then
            cp .env.example .env
            echo "Created $DEPLOY_DIR/.env from .env.example. Update it with production secrets before exposing traffic."
          fi

          if ! docker compose version >/dev/null 2>&1; then
            echo "docker compose is required on the VPS"
            exit 1
          fi

          if [ -n "$GHCR_TOKEN" ]; then
            printf '%s' "$GHCR_TOKEN" | docker login "$REGISTRY" -u "$GHCR_USERNAME" --password-stdin >/dev/null
          fi

          export GO_IMAGE_TAG="$VERSION"
          export GO_API_IMAGE="$REGISTRY/$IMAGE_PREFIX/wework-api:$VERSION"
          export GO_WEB_IMAGE="$REGISTRY/$IMAGE_PREFIX/wework-web:$VERSION"
          export GO_INCOMING_WORKER_IMAGE="$REGISTRY/$IMAGE_PREFIX/wework-incoming-worker:$VERSION"

          echo "Pulling images for: $COMPOSE_SERVICES"
          docker compose --env-file .env pull $COMPOSE_SERVICES

          if docker ps -a --filter "label=com.docker.compose.project=im-go-cloud" --format '{{.ID}}' | grep -q .; then
            echo "Stopping legacy im-go-cloud compose project..."
            docker compose --env-file .env -p im-go-cloud down --remove-orphans
          fi

          echo "Starting services..."
          docker compose --env-file .env up -d --remove-orphans $COMPOSE_SERVICES

          echo "Cleaning up old images..."
          docker image prune -f

          echo "Deployment complete."
          docker compose --env-file .env ps
          REMOTE

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    env:
      VPS_API_URL: ${{ vars.VPS_API_URL || secrets.VPS_API_URL }}
      VPS_WEB_URL: ${{ vars.VPS_WEB_URL || secrets.VPS_WEB_URL }}
    steps:
      - name: Wait for services
        run: sleep 30

      - name: Check API health
        run: |
          if [ -z "$VPS_API_URL" ]; then
            echo "VPS_API_URL is not set; skipping API health check"
            exit 0
          fi
          curl -f "$VPS_API_URL/healthz"
          echo "API health check passed"

      - name: Check Web health
        run: |
          if [ -z "$VPS_WEB_URL" ]; then
            echo "VPS_WEB_URL is not set; skipping Web health check"
            exit 0
          fi
          curl -f "$VPS_WEB_URL"
          echo "Web health check passed"
