name: Deploy to VPS

on:
  workflow_run:
    workflows: ["Build Images"]
    types: [completed]
    branches: ["release/v*.*.*"]

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

concurrency:
  group: deploy-vps-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.event.workflow_run.conclusion == 'success'
    environment: production
    env:
      VPS_HOST: ${{ vars.VPS_HOST || secrets.VPS_HOST }}
      VPS_USER: ${{ vars.VPS_USER || secrets.VPS_USER }}
      VPS_PORT: ${{ vars.VPS_PORT || secrets.VPS_PORT || '22' }}
      VPS_DEPLOY_DIR: ${{ vars.VPS_DEPLOY_DIR || secrets.VPS_DEPLOY_DIR || '/opt/im' }}
      VPS_COMPOSE_SERVICES: ${{ vars.VPS_COMPOSE_SERVICES || 'postgres redis migrate api celery_worker celery_beat telegram_listener frontend cloudflared' }}
      RELEASE_BRANCH: ${{ github.event.workflow_run.head_branch }}
      DEPLOY_ENVIRONMENT: production
      GHCR_USERNAME: ${{ vars.GHCR_USERNAME || github.actor }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || github.token }}
      CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
      RUNTIME_APP_ENV: ${{ vars.APP_ENV || 'prod' }}
      RUNTIME_DEBUG: ${{ vars.DEBUG || 'false' }}
      RUNTIME_ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
      RUNTIME_ACCESS_TOKEN_EXPIRE_MINUTES: ${{ vars.ACCESS_TOKEN_EXPIRE_MINUTES }}
      RUNTIME_GOOGLE_OAUTH_CLIENT_ID: ${{ vars.GOOGLE_OAUTH_CLIENT_ID }}
      RUNTIME_GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
      RUNTIME_GOOGLE_OAUTH_REDIRECT_URI: ${{ vars.GOOGLE_OAUTH_REDIRECT_URI }}
      RUNTIME_APPLE_OAUTH_CLIENT_ID: ${{ vars.APPLE_OAUTH_CLIENT_ID }}
      RUNTIME_APPLE_OAUTH_CLIENT_SECRET: ${{ secrets.APPLE_OAUTH_CLIENT_SECRET }}
      RUNTIME_APPLE_OAUTH_REDIRECT_URI: ${{ vars.APPLE_OAUTH_REDIRECT_URI }}
      RUNTIME_APPLE_OAUTH_TEAM_ID: ${{ vars.APPLE_OAUTH_TEAM_ID }}
      RUNTIME_APPLE_OAUTH_KEY_ID: ${{ vars.APPLE_OAUTH_KEY_ID }}
      RUNTIME_APPLE_OAUTH_PRIVATE_KEY: ${{ secrets.APPLE_OAUTH_PRIVATE_KEY }}
      RUNTIME_DEFAULT_TIMEZONE: ${{ vars.DEFAULT_TIMEZONE }}
      RUNTIME_DEFAULT_WORKDAYS: ${{ vars.DEFAULT_WORKDAYS }}
      RUNTIME_DEFAULT_WORK_START: ${{ vars.DEFAULT_WORK_START }}
      RUNTIME_DEFAULT_WORK_END: ${{ vars.DEFAULT_WORK_END }}
      RUNTIME_PENDING_HUMAN_SLA_MINUTES: ${{ vars.PENDING_HUMAN_SLA_MINUTES }}
      RUNTIME_AI_ENABLED: ${{ vars.AI_ENABLED }}
      RUNTIME_LITELLM_MODEL: ${{ vars.LITELLM_MODEL }}
      RUNTIME_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      RUNTIME_PI_AGENT_ENABLED: ${{ vars.PI_AGENT_ENABLED }}
      RUNTIME_PI_AGENT_PROVIDER: ${{ vars.PI_AGENT_PROVIDER }}
      RUNTIME_PI_AGENT_MODEL: ${{ vars.PI_AGENT_MODEL }}
      RUNTIME_PI_AGENT_API_KEY: ${{ vars.PI_AGENT_PROVIDER == 'deepseek' && secrets.DEEPSEEK_API_KEY || secrets.PI_AGENT_API_KEY }}
      RUNTIME_PI_AGENT_TIMEOUT_SECONDS: ${{ vars.PI_AGENT_TIMEOUT_SECONDS }}
      RUNTIME_PI_AGENT_MIN_OPPORTUNITY_CONFIDENCE: ${{ vars.PI_AGENT_MIN_OPPORTUNITY_CONFIDENCE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Resolve release version
        run: |
          set -euo pipefail
          version="${RELEASE_BRANCH#release/}"
          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release branch must match release/v<major>.<minor>.<patch>, got: $RELEASE_BRANCH"
            exit 1
          fi
          echo "DEPLOY_VERSION=$version" >> "$GITHUB_ENV"

      - name: Validate deploy configuration
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$VPS_HOST" || { echo "VPS_HOST is required"; exit 1; }
          test -n "$VPS_USER" || { echo "VPS_USER is required"; exit 1; }
          test -n "$VPS_SSH_KEY" || { echo "VPS_SSH_KEY secret is required"; exit 1; }
          google_ready=false
          apple_ready=false
          if [ -n "$RUNTIME_GOOGLE_OAUTH_CLIENT_ID" ] || [ -n "$RUNTIME_GOOGLE_OAUTH_CLIENT_SECRET" ]; then
            test -n "$RUNTIME_GOOGLE_OAUTH_CLIENT_ID" || { echo "GOOGLE_OAUTH_CLIENT_ID var is required when Google OAuth is configured"; exit 1; }
            test -n "$RUNTIME_GOOGLE_OAUTH_CLIENT_SECRET" || { echo "GOOGLE_OAUTH_CLIENT_SECRET secret is required when Google OAuth is configured"; exit 1; }
            google_ready=true
          fi
          if [ -n "$RUNTIME_APPLE_OAUTH_CLIENT_ID" ] || [ -n "$RUNTIME_APPLE_OAUTH_CLIENT_SECRET" ] || [ -n "$RUNTIME_APPLE_OAUTH_PRIVATE_KEY" ]; then
            test -n "$RUNTIME_APPLE_OAUTH_CLIENT_ID" || { echo "APPLE_OAUTH_CLIENT_ID var is required when Apple OAuth is configured"; exit 1; }
            if [ -z "$RUNTIME_APPLE_OAUTH_CLIENT_SECRET" ]; then
              test -n "$RUNTIME_APPLE_OAUTH_TEAM_ID" || { echo "APPLE_OAUTH_TEAM_ID var is required when APPLE_OAUTH_CLIENT_SECRET is not set"; exit 1; }
              test -n "$RUNTIME_APPLE_OAUTH_KEY_ID" || { echo "APPLE_OAUTH_KEY_ID var is required when APPLE_OAUTH_CLIENT_SECRET is not set"; exit 1; }
              test -n "$RUNTIME_APPLE_OAUTH_PRIVATE_KEY" || { echo "APPLE_OAUTH_PRIVATE_KEY secret is required when APPLE_OAUTH_CLIENT_SECRET is not set"; exit 1; }
            fi
            apple_ready=true
          fi
          if [ "$google_ready" != "true" ] && [ "$apple_ready" != "true" ]; then
            echo "Configure at least one OAuth provider through GitHub vars/secrets."
            exit 1
          fi
          case " $VPS_COMPOSE_SERVICES " in
            *" cloudflared "*)
              test -n "$CLOUDFLARE_TUNNEL_TOKEN" || { echo "CLOUDFLARE_TUNNEL_TOKEN secret is required when deploying cloudflared"; exit 1; }
              ;;
          esac
          case "$VPS_DEPLOY_DIR" in
            *"'"*) echo "VPS_DEPLOY_DIR must not contain single quotes"; exit 1 ;;
          esac

      - name: Prepare SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/vps_deploy_key
          chmod 600 ~/.ssh/vps_deploy_key
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Sync compose files and runtime env
        run: |
          set -euo pipefail
          quote() {
            printf "%q" "$1"
          }
          dotenv_quote() {
            VALUE="$1" python3 - <<'PY'
          import os

          value = os.environ["VALUE"]
          value = value.replace("\\", "\\\\").replace('"', '\\"').replace("\r", "\\r").replace("\n", "\\n")
          print(f'"{value}"')
          PY
          }
          append_env() {
            key="$1"
            value="$2"
            if [ -n "$value" ]; then
              printf '%s=%s\n' "$key" "$(dotenv_quote "$value")" >> "$env_updates"
            fi
          }

          env_updates="$(mktemp)"

          append_env APP_ENV "$RUNTIME_APP_ENV"
          append_env DEBUG "$RUNTIME_DEBUG"
          append_env ADMIN_API_TOKEN "$RUNTIME_ADMIN_API_TOKEN"
          append_env ACCESS_TOKEN_EXPIRE_MINUTES "$RUNTIME_ACCESS_TOKEN_EXPIRE_MINUTES"
          append_env FRONTEND_BASE_URL "https://im.story2u.xyz"
          append_env CORS_ORIGINS '["https://im.story2u.xyz","http://localhost:3000"]'
          append_env GOOGLE_OAUTH_CLIENT_ID "$RUNTIME_GOOGLE_OAUTH_CLIENT_ID"
          append_env GOOGLE_OAUTH_CLIENT_SECRET "$RUNTIME_GOOGLE_OAUTH_CLIENT_SECRET"
          append_env GOOGLE_OAUTH_REDIRECT_URI "$RUNTIME_GOOGLE_OAUTH_REDIRECT_URI"
          append_env APPLE_OAUTH_CLIENT_ID "$RUNTIME_APPLE_OAUTH_CLIENT_ID"
          append_env APPLE_OAUTH_CLIENT_SECRET "$RUNTIME_APPLE_OAUTH_CLIENT_SECRET"
          append_env APPLE_OAUTH_REDIRECT_URI "$RUNTIME_APPLE_OAUTH_REDIRECT_URI"
          append_env APPLE_OAUTH_TEAM_ID "$RUNTIME_APPLE_OAUTH_TEAM_ID"
          append_env APPLE_OAUTH_KEY_ID "$RUNTIME_APPLE_OAUTH_KEY_ID"
          append_env APPLE_OAUTH_PRIVATE_KEY "$RUNTIME_APPLE_OAUTH_PRIVATE_KEY"
          append_env DEFAULT_TIMEZONE "$RUNTIME_DEFAULT_TIMEZONE"
          append_env DEFAULT_WORKDAYS "$RUNTIME_DEFAULT_WORKDAYS"
          append_env DEFAULT_WORK_START "$RUNTIME_DEFAULT_WORK_START"
          append_env DEFAULT_WORK_END "$RUNTIME_DEFAULT_WORK_END"
          append_env PENDING_HUMAN_SLA_MINUTES "$RUNTIME_PENDING_HUMAN_SLA_MINUTES"
          append_env AI_ENABLED "$RUNTIME_AI_ENABLED"
          append_env LITELLM_MODEL "$RUNTIME_LITELLM_MODEL"
          append_env OPENAI_API_KEY "$RUNTIME_OPENAI_API_KEY"
          append_env PI_AGENT_ENABLED "$RUNTIME_PI_AGENT_ENABLED"
          append_env PI_AGENT_PROVIDER "$RUNTIME_PI_AGENT_PROVIDER"
          append_env PI_AGENT_MODEL "$RUNTIME_PI_AGENT_MODEL"
          append_env PI_AGENT_API_KEY "$RUNTIME_PI_AGENT_API_KEY"
          append_env PI_AGENT_TIMEOUT_SECONDS "$RUNTIME_PI_AGENT_TIMEOUT_SECONDS"
          append_env PI_AGENT_MIN_OPPORTUNITY_CONFIDENCE "$RUNTIME_PI_AGENT_MIN_OPPORTUNITY_CONFIDENCE"
          append_env CLOUDFLARE_TUNNEL_TOKEN "$CLOUDFLARE_TUNNEL_TOKEN"

          ssh -i ~/.ssh/vps_deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "mkdir -p '$VPS_DEPLOY_DIR'"
          scp -i ~/.ssh/vps_deploy_key -P "$VPS_PORT" \
            backend/docker-compose.prod.yml \
            backend/.env.example \
            "$VPS_USER@$VPS_HOST:$VPS_DEPLOY_DIR/"
          scp -i ~/.ssh/vps_deploy_key -P "$VPS_PORT" "$env_updates" "$VPS_USER@$VPS_HOST:$VPS_DEPLOY_DIR/.env.incoming"
          ssh -i ~/.ssh/vps_deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "DEPLOY_DIR=$(quote "$VPS_DEPLOY_DIR") bash -s" <<'REMOTE'
          set -euo pipefail

          cd "$DEPLOY_DIR"
          mv docker-compose.prod.yml docker-compose.yml
          python3 - <<'PY'
          import secrets
          from pathlib import Path

          def env_key(line: str) -> str | None:
              stripped = line.strip()
              if not stripped or stripped.startswith("#") or "=" not in stripped:
                  return None
              return stripped.split("=", 1)[0].strip()

          base_path = Path(".env")
          incoming_path = Path(".env.incoming")
          lines: list[str] = []
          positions: dict[str, int] = {}

          if base_path.exists():
              for line in base_path.read_text().splitlines():
                  key = env_key(line)
                  if key and key not in positions:
                      positions[key] = len(lines)
                  lines.append(line)

          for line in incoming_path.read_text().splitlines():
              key = env_key(line)
              if not key:
                  continue
              if key in positions:
                  lines[positions[key]] = line
              else:
                  positions[key] = len(lines)
                  lines.append(line)

          def raw_value(key: str) -> str:
              if key not in positions:
                  return ""
              value = lines[positions[key]].split("=", 1)[1].strip()
              if (value.startswith('"') and value.endswith('"')) or (value.startswith("'") and value.endswith("'")):
                  value = value[1:-1]
              return value.strip()

          def upsert(key: str, line: str) -> None:
              if key in positions:
                  lines[positions[key]] = line
                  return
              positions[key] = len(lines)
              lines.append(line)

          if raw_value("JWT_SECRET_KEY") in {"", "change-me", "change-me-with-a-long-random-string"}:
              upsert("JWT_SECRET_KEY", f'JWT_SECRET_KEY="{secrets.token_urlsafe(48)}"')

          base_path.write_text("\n".join(lines).rstrip() + "\n")
          incoming_path.unlink(missing_ok=True)
          PY
          chmod 600 .env
          REMOTE
          rm -f "$env_updates"

      - name: Deploy services
        run: |
          set -euo pipefail
          quote() {
            printf "%q" "$1"
          }
          remote_env=(
            "DEPLOY_DIR=$(quote "$VPS_DEPLOY_DIR")"
            "VERSION=$(quote "$DEPLOY_VERSION")"
            "ENVIRONMENT=$(quote "$DEPLOY_ENVIRONMENT")"
            "REGISTRY=$(quote "$REGISTRY")"
            "IMAGE_NAMESPACE=$(quote "$IMAGE_NAMESPACE")"
            "GHCR_USERNAME=$(quote "$GHCR_USERNAME")"
            "GHCR_TOKEN=$(quote "$GHCR_TOKEN")"
            "COMPOSE_SERVICES=$(quote "$VPS_COMPOSE_SERVICES")"
            "CLOUDFLARE_TUNNEL_TOKEN=$(quote "$CLOUDFLARE_TUNNEL_TOKEN")"
          )
          ssh -i ~/.ssh/vps_deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "${remote_env[*]} bash -s" <<'REMOTE'
          set -euo pipefail

          cd "$DEPLOY_DIR"
          echo "Deploying ${VERSION} to ${ENVIRONMENT}..."

          if [ ! -f .env ]; then
            cp .env.example .env
            echo "Created $DEPLOY_DIR/.env from .env.example. Replace change-me values before exposing traffic."
          fi

          if ! docker compose version >/dev/null 2>&1; then
            echo "docker compose is required on the VPS"
            exit 1
          fi

          if [ -n "$GHCR_TOKEN" ]; then
            printf '%s' "$GHCR_TOKEN" | docker login "$REGISTRY" -u "$GHCR_USERNAME" --password-stdin >/dev/null
          fi

          export BACKEND_IMAGE="$REGISTRY/$IMAGE_NAMESPACE/im-backend:$VERSION"
          export FRONTEND_IMAGE="$REGISTRY/$IMAGE_NAMESPACE/im-frontend:$VERSION"
          export CLOUDFLARE_TUNNEL_TOKEN

          docker compose --env-file .env config >/dev/null

          wait_for_health() {
            service="$1"
            container_id="$(docker compose --env-file .env ps -q "$service" || true)"
            if [ -z "$container_id" ]; then
              return 0
            fi
            status="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$container_id")"
            if [ "$status" = "none" ]; then
              return 0
            fi
            for _ in $(seq 1 60); do
              status="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$container_id")"
              if [ "$status" = "healthy" ]; then
                return 0
              fi
              sleep 2
            done
            echo "$service did not become healthy"
            docker compose --env-file .env logs --tail=80 "$service"
            exit 1
          }

          echo "Pulling images for: $COMPOSE_SERVICES"
          docker compose --env-file .env pull $COMPOSE_SERVICES

          stateful_services=""
          runtime_services=""
          run_migrate=false
          for service in $COMPOSE_SERVICES; do
            case "$service" in
              migrate)
                run_migrate=true
                ;;
              postgres|redis)
                stateful_services="$stateful_services $service"
                ;;
              *)
                runtime_services="$runtime_services $service"
                ;;
            esac
          done

          if [ -n "$stateful_services" ]; then
            echo "Starting stateful services:$stateful_services"
            docker compose --env-file .env up -d $stateful_services
            for service in $stateful_services; do
              wait_for_health "$service"
            done
          fi

          if [ "$run_migrate" = "true" ]; then
            echo "Running database migrations..."
            docker compose --env-file .env rm -f migrate >/dev/null 2>&1 || true
            docker compose --env-file .env up --no-deps --force-recreate --exit-code-from migrate migrate
          fi

          if [ -n "$runtime_services" ]; then
            echo "Starting runtime services:$runtime_services"
            docker compose --env-file .env up -d --remove-orphans --no-deps --force-recreate $runtime_services
          fi

          echo "Cleaning up dangling images..."
          docker image prune -f

          echo "Deployment complete."
          docker compose --env-file .env ps
          REMOTE

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    timeout-minutes: 5
    env:
      VPS_API_URL: ${{ vars.VPS_API_URL || secrets.VPS_API_URL }}
      VPS_FRONTEND_URL: ${{ vars.VPS_FRONTEND_URL || secrets.VPS_FRONTEND_URL }}
    steps:
      - name: Wait for services
        run: sleep 30

      - name: Check API health
        run: |
          set -euo pipefail
          if [ -z "$VPS_API_URL" ]; then
            echo "VPS_API_URL is not set; skipping API health check"
            exit 0
          fi
          curl -fsS "$VPS_API_URL/healthz"
          echo "API health check passed"

      - name: Check frontend health
        run: |
          set -euo pipefail
          if [ -z "$VPS_FRONTEND_URL" ]; then
            echo "VPS_FRONTEND_URL is not set; skipping frontend health check"
            exit 0
          fi
          curl -fsS "$VPS_FRONTEND_URL"
          echo "Frontend health check passed"
