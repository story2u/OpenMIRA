name: Deploy to VPS

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: ["release/v*.*.*"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

concurrency:
  group: deploy-vps-production
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: production
    if: github.event.workflow_run.conclusion == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: im-backend
            context: .
            file: backend/Dockerfile
          - image: im-frontend
            context: .
            file: frontend/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Resolve release metadata
        id: release
        env:
          RELEASE_BRANCH: ${{ github.event.workflow_run.head_branch }}
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          version="${RELEASE_BRANCH#release/}"
          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release branch must match release/v<major>.<minor>.<patch>, got: $RELEASE_BRANCH"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "short_sha=${RELEASE_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ steps.release.outputs.version }}
            type=raw,value=sha-${{ steps.release.outputs.short_sha }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
          build-args: |
            NEXT_PUBLIC_REVENUECAT_WEB_API_KEY=${{ matrix.image == 'im-frontend' && vars.NEXT_PUBLIC_REVENUECAT_WEB_API_KEY || '' }}
            NEXT_PUBLIC_REVENUECAT_OFFERING_ID=${{ vars.NEXT_PUBLIC_REVENUECAT_OFFERING_ID || 'default' }}

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: needs.build.result == 'success'
    environment: production
    env:
      VPS_HOST: ${{ vars.VPS_HOST || secrets.VPS_HOST }}
      VPS_USER: ${{ vars.VPS_USER || secrets.VPS_USER }}
      VPS_PORT: ${{ vars.VPS_PORT || secrets.VPS_PORT || '22' }}
      VPS_DEPLOY_DIR: ${{ vars.VPS_DEPLOY_DIR || secrets.VPS_DEPLOY_DIR || '/opt/im' }}
      VPS_COMPOSE_SERVICES: ${{ vars.VPS_COMPOSE_SERVICES || 'postgres redis migrate api celery_worker celery_beat wecom_archive_worker telegram_listener telegram_mtproto_qr_worker telegram_mtproto_listener frontend cloudflared' }}
      RELEASE_BRANCH: ${{ github.event.workflow_run.head_branch }}
      DEPLOY_ENVIRONMENT: production
      GHCR_USERNAME: ${{ vars.GHCR_USERNAME || github.actor }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || github.token }}
      CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
      RUNTIME_APP_ENV: ${{ vars.APP_ENV || 'prod' }}
      RUNTIME_DEBUG: ${{ vars.DEBUG || 'false' }}
      RUNTIME_ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
      RUNTIME_ACCESS_TOKEN_EXPIRE_MINUTES: ${{ vars.ACCESS_TOKEN_EXPIRE_MINUTES }}
      RUNTIME_DEVICE_REFRESH_TOKEN_DAYS: ${{ vars.DEVICE_REFRESH_TOKEN_DAYS || '30' }}
      RUNTIME_DEVICE_MAX_ACTIVE_PER_USER: ${{ vars.DEVICE_MAX_ACTIVE_PER_USER || '20' }}
      RUNTIME_SYNC_CHANGE_RETENTION_DAYS: ${{ vars.SYNC_CHANGE_RETENTION_DAYS || '30' }}
      RUNTIME_SYNC_BOOTSTRAP_TOKEN_MINUTES: ${{ vars.SYNC_BOOTSTRAP_TOKEN_MINUTES || '60' }}
      RUNTIME_RN_SYNC_ROLLOUT_ENABLED: ${{ vars.RN_SYNC_ROLLOUT_ENABLED || 'false' }}
      RUNTIME_RN_DEVICE_AGENT_ROLLOUT_ENABLED: ${{ vars.RN_DEVICE_AGENT_ROLLOUT_ENABLED || 'false' }}
      RUNTIME_RN_DEVICE_AGENT_ROLLOUT_PERCENTAGE: ${{ vars.RN_DEVICE_AGENT_ROLLOUT_PERCENTAGE || '0' }}
      RUNTIME_RN_PUSH_ROLLOUT_ENABLED: ${{ vars.RN_PUSH_ROLLOUT_ENABLED || 'false' }}
      RUNTIME_PUSH_DISPATCH_ENABLED: ${{ vars.PUSH_DISPATCH_ENABLED || 'false' }}
      RUNTIME_PUSH_DISPATCH_INTERVAL_SECONDS: ${{ vars.PUSH_DISPATCH_INTERVAL_SECONDS || '15' }}
      RUNTIME_PUSH_DISPATCH_BATCH_SIZE: ${{ vars.PUSH_DISPATCH_BATCH_SIZE || '100' }}
      RUNTIME_PUSH_DISPATCH_LEASE_SECONDS: ${{ vars.PUSH_DISPATCH_LEASE_SECONDS || '120' }}
      RUNTIME_APNS_TEAM_ID: ${{ vars.APNS_TEAM_ID }}
      RUNTIME_APNS_KEY_ID: ${{ vars.APNS_KEY_ID }}
      RUNTIME_APNS_PRIVATE_KEY: ${{ secrets.APNS_PRIVATE_KEY }}
      RUNTIME_APNS_TOPIC: ${{ vars.APNS_TOPIC || 'com.codeiy.im' }}
      RUNTIME_APNS_SANDBOX_TOPIC: ${{ vars.APNS_SANDBOX_TOPIC || 'com.codeiy.im.dev' }}
      RUNTIME_FCM_PROJECT_ID: ${{ vars.FCM_PROJECT_ID }}
      RUNTIME_FCM_CLIENT_EMAIL: ${{ vars.FCM_CLIENT_EMAIL }}
      RUNTIME_FCM_PRIVATE_KEY: ${{ secrets.FCM_PRIVATE_KEY }}
      RUNTIME_RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RUNTIME_GOOGLE_OAUTH_CLIENT_ID: ${{ vars.GOOGLE_OAUTH_CLIENT_ID }}
      RUNTIME_GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
      RUNTIME_GOOGLE_OAUTH_REDIRECT_URI: ${{ vars.GOOGLE_OAUTH_REDIRECT_URI }}
      RUNTIME_APPLE_OAUTH_CLIENT_ID: ${{ vars.APPLE_OAUTH_CLIENT_ID }}
      RUNTIME_APPLE_OAUTH_CLIENT_SECRET: ${{ secrets.APPLE_OAUTH_CLIENT_SECRET }}
      RUNTIME_APPLE_OAUTH_REDIRECT_URI: ${{ vars.APPLE_OAUTH_REDIRECT_URI }}
      RUNTIME_APPLE_OAUTH_TEAM_ID: ${{ vars.APPLE_OAUTH_TEAM_ID }}
      RUNTIME_APPLE_OAUTH_KEY_ID: ${{ vars.APPLE_OAUTH_KEY_ID }}
      RUNTIME_APPLE_OAUTH_PRIVATE_KEY: ${{ secrets.APPLE_OAUTH_PRIVATE_KEY }}
      RUNTIME_GOOGLE_NATIVE_CLIENT_IDS: ${{ vars.GOOGLE_NATIVE_CLIENT_IDS }}
      RUNTIME_APPLE_NATIVE_CLIENT_IDS: ${{ vars.APPLE_NATIVE_CLIENT_IDS || 'com.codeiy.im' }}
      RUNTIME_DEFAULT_TIMEZONE: ${{ vars.DEFAULT_TIMEZONE }}
      RUNTIME_DEFAULT_WORKDAYS: ${{ vars.DEFAULT_WORKDAYS }}
      RUNTIME_DEFAULT_WORK_START: ${{ vars.DEFAULT_WORK_START }}
      RUNTIME_DEFAULT_WORK_END: ${{ vars.DEFAULT_WORK_END }}
      RUNTIME_PENDING_HUMAN_SLA_MINUTES: ${{ vars.PENDING_HUMAN_SLA_MINUTES }}
      RUNTIME_TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      RUNTIME_TELEGRAM_BOT_USERNAME: ${{ vars.TELEGRAM_BOT_USERNAME }}
      RUNTIME_TELEGRAM_MTPROTO_QR_ENABLED: ${{ vars.TELEGRAM_MTPROTO_QR_ENABLED || 'false' }}
      RUNTIME_TELEGRAM_MTPROTO_QR_WORKER_ENABLED: ${{ vars.TELEGRAM_MTPROTO_QR_WORKER_ENABLED || 'false' }}
      RUNTIME_TELEGRAM_MTPROTO_API_ID: ${{ vars.TELEGRAM_MTPROTO_API_ID }}
      RUNTIME_TELEGRAM_MTPROTO_API_HASH: ${{ secrets.TELEGRAM_MTPROTO_API_HASH }}
      RUNTIME_WECOM_ARCHIVE_ENABLED: ${{ vars.WECOM_ARCHIVE_ENABLED || 'false' }}
      RUNTIME_AI_ENABLED: ${{ vars.AI_ENABLED }}
      RUNTIME_IM_SEND_ENABLED: ${{ vars.IM_SEND_ENABLED || 'false' }}
      RUNTIME_LITELLM_MODEL: ${{ vars.LITELLM_MODEL }}
      RUNTIME_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      RUNTIME_DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      RUNTIME_PI_AGENT_ENABLED: ${{ vars.PI_AGENT_ENABLED || 'true' }}
      RUNTIME_PI_AGENT_PROVIDER: ${{ vars.PI_AGENT_PROVIDER || 'openai' }}
      RUNTIME_PI_AGENT_MODEL: ${{ vars.PI_AGENT_MODEL || 'gpt-4o-mini' }}
      RUNTIME_PI_AGENT_API_KEY: ${{ vars.PI_AGENT_PROVIDER == 'deepseek' && secrets.DEEPSEEK_API_KEY || secrets.PI_AGENT_API_KEY }}
      RUNTIME_PI_AGENT_TIMEOUT_SECONDS: ${{ vars.PI_AGENT_TIMEOUT_SECONDS }}
      RUNTIME_PI_AGENT_MIN_OPPORTUNITY_CONFIDENCE: ${{ vars.PI_AGENT_MIN_OPPORTUNITY_CONFIDENCE }}
      RUNTIME_DEVICE_AGENT_LEASE_SECONDS: ${{ vars.DEVICE_AGENT_LEASE_SECONDS || '120' }}
      RUNTIME_DEVICE_AGENT_RUN_TOKEN_MINUTES: ${{ vars.DEVICE_AGENT_RUN_TOKEN_MINUTES || '10' }}
      RUNTIME_DEVICE_AGENT_SCHEMA_VERSION: ${{ vars.DEVICE_AGENT_SCHEMA_VERSION || '1' }}
      RUNTIME_DEVICE_AGENT_RUNTIME_VERSION: ${{ vars.DEVICE_AGENT_RUNTIME_VERSION || 'pi-0.80.6' }}
      RUNTIME_DEVICE_AGENT_MODEL_ALIAS: ${{ vars.DEVICE_AGENT_MODEL_ALIAS || 'radar-analysis-v1' }}
      RUNTIME_DEVICE_AGENT_POLICY_VERSION: ${{ vars.DEVICE_AGENT_POLICY_VERSION || 'agent-policy-v1' }}
      RUNTIME_DEVICE_AGENT_SHADOW_ENABLED: ${{ vars.DEVICE_AGENT_SHADOW_ENABLED || 'false' }}
      RUNTIME_DEVICE_AGENT_FALLBACK_ENABLED: ${{ vars.DEVICE_AGENT_FALLBACK_ENABLED || 'false' }}
      RUNTIME_DEVICE_AGENT_SHADOW_LOOKBACK_HOURS: ${{ vars.DEVICE_AGENT_SHADOW_LOOKBACK_HOURS || '24' }}
      RUNTIME_DEVICE_AGENT_ROLLOUT_ALLOWLIST: ${{ vars.DEVICE_AGENT_ROLLOUT_ALLOWLIST || '' }}
      RUNTIME_DEVICE_AGENT_ROLLOUT_REQUIRE_SHADOW_READY: ${{ vars.DEVICE_AGENT_ROLLOUT_REQUIRE_SHADOW_READY || 'true' }}
      RUNTIME_DEVICE_AGENT_ROLLOUT_LOOKBACK_HOURS: ${{ vars.DEVICE_AGENT_ROLLOUT_LOOKBACK_HOURS || '24' }}
      RUNTIME_DEVICE_AGENT_ROLLOUT_MIN_SHADOW_SAMPLES: ${{ vars.DEVICE_AGENT_ROLLOUT_MIN_SHADOW_SAMPLES || '50' }}
      RUNTIME_DEVICE_AGENT_ROLLOUT_MIN_SHADOW_SUCCESS_RATE: ${{ vars.DEVICE_AGENT_ROLLOUT_MIN_SHADOW_SUCCESS_RATE || '0.95' }}
      RUNTIME_DEVICE_AGENT_ROLLOUT_MIN_SHADOW_MATCH_RATE: ${{ vars.DEVICE_AGENT_ROLLOUT_MIN_SHADOW_MATCH_RATE || '0.95' }}
      RUNTIME_DEVICE_AGENT_ROLLOUT_MAX_P95_SECONDS: ${{ vars.DEVICE_AGENT_ROLLOUT_MAX_P95_SECONDS || '120' }}
      RUNTIME_DEVICE_AGENT_RECENT_DEVICE_MINUTES: ${{ vars.DEVICE_AGENT_RECENT_DEVICE_MINUTES || '15' }}
      RUNTIME_DEVICE_AGENT_PRIMARY_CLAIM_WINDOW_SECONDS: ${{ vars.DEVICE_AGENT_PRIMARY_CLAIM_WINDOW_SECONDS || '90' }}
      RUNTIME_DEVICE_AGENT_EXPIRE_INTERVAL_SECONDS: ${{ vars.DEVICE_AGENT_EXPIRE_INTERVAL_SECONDS || '30' }}
      RUNTIME_DEVICE_AGENT_EXPIRE_BATCH_SIZE: ${{ vars.DEVICE_AGENT_EXPIRE_BATCH_SIZE || '100' }}
      RUNTIME_DEVICE_AGENT_GATEWAY_ENABLED: ${{ vars.DEVICE_AGENT_GATEWAY_ENABLED || 'false' }}
      RUNTIME_DEVICE_AGENT_GATEWAY_PROVIDER: ${{ vars.DEVICE_AGENT_GATEWAY_PROVIDER || 'openai' }}
      RUNTIME_DEVICE_AGENT_GATEWAY_BASE_URL: ${{ vars.DEVICE_AGENT_GATEWAY_BASE_URL || 'https://api.openai.com/v1' }}
      RUNTIME_DEVICE_AGENT_GATEWAY_API_KEY: ${{ secrets.DEVICE_AGENT_GATEWAY_API_KEY }}
      RUNTIME_DEVICE_AGENT_GATEWAY_MODEL: ${{ vars.DEVICE_AGENT_GATEWAY_MODEL || 'gpt-4o-mini' }}
      RUNTIME_DEVICE_AGENT_GATEWAY_INPUT_COST_MICROS_PER_MILLION: ${{ vars.DEVICE_AGENT_GATEWAY_INPUT_COST_MICROS_PER_MILLION || '0' }}
      RUNTIME_DEVICE_AGENT_GATEWAY_OUTPUT_COST_MICROS_PER_MILLION: ${{ vars.DEVICE_AGENT_GATEWAY_OUTPUT_COST_MICROS_PER_MILLION || '0' }}
      RUNTIME_INTERACTIVE_AGENT_BETA_ENABLED: ${{ vars.INTERACTIVE_AGENT_BETA_ENABLED || 'false' }}
      RUNTIME_INTERACTIVE_AGENT_GATEWAY_ENABLED: ${{ vars.INTERACTIVE_AGENT_GATEWAY_ENABLED || 'false' }}
      RUNTIME_INTERACTIVE_AGENT_EXTERNAL_ACTIONS_ENABLED: ${{ vars.INTERACTIVE_AGENT_EXTERNAL_ACTIONS_ENABLED || 'false' }}
      RUNTIME_INTERACTIVE_AGENT_BETA_MONTHLY_TURN_LIMIT: ${{ vars.INTERACTIVE_AGENT_BETA_MONTHLY_TURN_LIMIT || '0' }}
      RUNTIME_INTERACTIVE_AGENT_DEVICE_ALLOWLIST: ${{ vars.INTERACTIVE_AGENT_DEVICE_ALLOWLIST || '' }}
      RUNTIME_INTERACTIVE_AGENT_LEASE_SECONDS: ${{ vars.INTERACTIVE_AGENT_LEASE_SECONDS || '300' }}
      RUNTIME_INTERACTIVE_AGENT_TURN_TOKEN_MINUTES: ${{ vars.INTERACTIVE_AGENT_TURN_TOKEN_MINUTES || '15' }}
      RUNTIME_INTERACTIVE_AGENT_APPROVAL_TOKEN_SECONDS: ${{ vars.INTERACTIVE_AGENT_APPROVAL_TOKEN_SECONDS || '120' }}
      RUNTIME_INTERACTIVE_AGENT_MAX_APPROVALS_PER_TURN: ${{ vars.INTERACTIVE_AGENT_MAX_APPROVALS_PER_TURN || '8' }}
      RUNTIME_INTERACTIVE_AGENT_SCHEMA_VERSION: ${{ vars.INTERACTIVE_AGENT_SCHEMA_VERSION || '1' }}
      RUNTIME_INTERACTIVE_AGENT_RUNTIME_VERSION: ${{ vars.INTERACTIVE_AGENT_RUNTIME_VERSION || 'pi-0.80.6' }}
      RUNTIME_INTERACTIVE_AGENT_MODEL_ALIAS: ${{ vars.INTERACTIVE_AGENT_MODEL_ALIAS || 'radar-interactive-v1' }}
      RUNTIME_INTERACTIVE_AGENT_POLICY_VERSION: ${{ vars.INTERACTIVE_AGENT_POLICY_VERSION || 'interactive-read-only-v1' }}
      RUNTIME_INTERACTIVE_AGENT_GATEWAY_MAX_REQUEST_BYTES: ${{ vars.INTERACTIVE_AGENT_GATEWAY_MAX_REQUEST_BYTES || '128000' }}
      RUNTIME_INTERACTIVE_AGENT_GATEWAY_MAX_PROMPT_CHARS: ${{ vars.INTERACTIVE_AGENT_GATEWAY_MAX_PROMPT_CHARS || '64000' }}
      RUNTIME_INTERACTIVE_AGENT_GATEWAY_MAX_OUTPUT_BYTES: ${{ vars.INTERACTIVE_AGENT_GATEWAY_MAX_OUTPUT_BYTES || '1000000' }}
      RUNTIME_INTERACTIVE_AGENT_GATEWAY_MAX_COMPLETION_TOKENS: ${{ vars.INTERACTIVE_AGENT_GATEWAY_MAX_COMPLETION_TOKENS || '4096' }}
      RUNTIME_INTERACTIVE_AGENT_GATEWAY_MAX_REQUESTS_PER_TURN: ${{ vars.INTERACTIVE_AGENT_GATEWAY_MAX_REQUESTS_PER_TURN || '8' }}
      RUNTIME_INTERACTIVE_AGENT_EXPIRE_INTERVAL_SECONDS: ${{ vars.INTERACTIVE_AGENT_EXPIRE_INTERVAL_SECONDS || '30' }}
      RUNTIME_INTERACTIVE_AGENT_EXPIRE_BATCH_SIZE: ${{ vars.INTERACTIVE_AGENT_EXPIRE_BATCH_SIZE || '100' }}
      RUNTIME_REVENUECAT_SECRET_API_KEY: ${{ secrets.REVENUECAT_SECRET_API_KEY }}
      RUNTIME_REVENUECAT_PROJECT_ID: ${{ vars.REVENUECAT_PROJECT_ID }}
      RUNTIME_REVENUECAT_WEBHOOK_HMAC_SECRET: ${{ secrets.REVENUECAT_WEBHOOK_HMAC_SECRET }}
      RUNTIME_NEXT_PUBLIC_REVENUECAT_WEB_API_KEY: ${{ vars.NEXT_PUBLIC_REVENUECAT_WEB_API_KEY || '' }}
      RUNTIME_NEXT_PUBLIC_REVENUECAT_OFFERING_ID: ${{ vars.NEXT_PUBLIC_REVENUECAT_OFFERING_ID || 'default' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Resolve release version
        run: |
          set -euo pipefail
          version="${RELEASE_BRANCH#release/}"
          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release branch must match release/v<major>.<minor>.<patch>, got: $RELEASE_BRANCH"
            exit 1
          fi
          echo "DEPLOY_VERSION=$version" >> "$GITHUB_ENV"

      - name: Validate deploy configuration
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$VPS_HOST" || { echo "VPS_HOST is required"; exit 1; }
          test -n "$VPS_USER" || { echo "VPS_USER is required"; exit 1; }
          test -n "$VPS_SSH_KEY" || { echo "VPS_SSH_KEY secret is required"; exit 1; }
          google_ready=false
          apple_ready=false
          if [ -n "$RUNTIME_GOOGLE_OAUTH_CLIENT_ID" ] || [ -n "$RUNTIME_GOOGLE_OAUTH_CLIENT_SECRET" ]; then
            test -n "$RUNTIME_GOOGLE_OAUTH_CLIENT_ID" || { echo "GOOGLE_OAUTH_CLIENT_ID var is required when Google OAuth is configured"; exit 1; }
            test -n "$RUNTIME_GOOGLE_OAUTH_CLIENT_SECRET" || { echo "GOOGLE_OAUTH_CLIENT_SECRET secret is required when Google OAuth is configured"; exit 1; }
            google_ready=true
          fi
          if [ -n "$RUNTIME_APPLE_OAUTH_CLIENT_ID" ] || [ -n "$RUNTIME_APPLE_OAUTH_CLIENT_SECRET" ] || [ -n "$RUNTIME_APPLE_OAUTH_PRIVATE_KEY" ]; then
            test -n "$RUNTIME_APPLE_OAUTH_CLIENT_ID" || { echo "APPLE_OAUTH_CLIENT_ID var is required when Apple OAuth is configured"; exit 1; }
            if [ -z "$RUNTIME_APPLE_OAUTH_CLIENT_SECRET" ]; then
              test -n "$RUNTIME_APPLE_OAUTH_TEAM_ID" || { echo "APPLE_OAUTH_TEAM_ID var is required when APPLE_OAUTH_CLIENT_SECRET is not set"; exit 1; }
              test -n "$RUNTIME_APPLE_OAUTH_KEY_ID" || { echo "APPLE_OAUTH_KEY_ID var is required when APPLE_OAUTH_CLIENT_SECRET is not set"; exit 1; }
              test -n "$RUNTIME_APPLE_OAUTH_PRIVATE_KEY" || { echo "APPLE_OAUTH_PRIVATE_KEY secret is required when APPLE_OAUTH_CLIENT_SECRET is not set"; exit 1; }
            fi
            apple_ready=true
          fi
          if [ "$google_ready" != "true" ] && [ "$apple_ready" != "true" ]; then
            echo "Configure at least one OAuth provider through GitHub vars/secrets."
            exit 1
          fi
          apns_ready=false
          fcm_ready=false
          if [ -n "$RUNTIME_APNS_TEAM_ID" ] || [ -n "$RUNTIME_APNS_KEY_ID" ] || [ -n "$RUNTIME_APNS_PRIVATE_KEY" ]; then
            test -n "$RUNTIME_APNS_TEAM_ID" || { echo "APNS_TEAM_ID var is required when APNs is configured"; exit 1; }
            test -n "$RUNTIME_APNS_KEY_ID" || { echo "APNS_KEY_ID var is required when APNs is configured"; exit 1; }
            test -n "$RUNTIME_APNS_PRIVATE_KEY" || { echo "APNS_PRIVATE_KEY secret is required when APNs is configured"; exit 1; }
            if [ -z "$RUNTIME_APNS_TOPIC" ] && [ -z "$RUNTIME_APNS_SANDBOX_TOPIC" ]; then
              echo "At least one APNS_TOPIC or APNS_SANDBOX_TOPIC var is required when APNs is configured"
              exit 1
            fi
            apns_ready=true
          fi
          if [ -n "$RUNTIME_FCM_PROJECT_ID" ] || [ -n "$RUNTIME_FCM_CLIENT_EMAIL" ] || [ -n "$RUNTIME_FCM_PRIVATE_KEY" ]; then
            test -n "$RUNTIME_FCM_PROJECT_ID" || { echo "FCM_PROJECT_ID var is required when FCM is configured"; exit 1; }
            test -n "$RUNTIME_FCM_CLIENT_EMAIL" || { echo "FCM_CLIENT_EMAIL var is required when FCM is configured"; exit 1; }
            test -n "$RUNTIME_FCM_PRIVATE_KEY" || { echo "FCM_PRIVATE_KEY secret is required when FCM is configured"; exit 1; }
            fcm_ready=true
          fi
          if [ "$RUNTIME_RN_PUSH_ROLLOUT_ENABLED" = "true" ] || [ "$RUNTIME_PUSH_DISPATCH_ENABLED" = "true" ]; then
            test "$RUNTIME_RN_SYNC_ROLLOUT_ENABLED" = "true" || { echo "RN_SYNC_ROLLOUT_ENABLED must be true before native push is enabled"; exit 1; }
            test "$RUNTIME_RN_PUSH_ROLLOUT_ENABLED" = "true" || { echo "RN_PUSH_ROLLOUT_ENABLED must be true when push dispatch is enabled"; exit 1; }
            test "$RUNTIME_PUSH_DISPATCH_ENABLED" = "true" || { echo "PUSH_DISPATCH_ENABLED must be true when native push rollout is enabled"; exit 1; }
            if [ "$apns_ready" != "true" ] && [ "$fcm_ready" != "true" ]; then
              echo "Configure at least one complete APNs or FCM provider before enabling native push."
              exit 1
            fi
          fi
          if [ "$RUNTIME_RN_DEVICE_AGENT_ROLLOUT_ENABLED" = "true" ]; then
            test "$RUNTIME_RN_SYNC_ROLLOUT_ENABLED" = "true" || { echo "RN_SYNC_ROLLOUT_ENABLED must be true before device Agent rollout"; exit 1; }
            test "$RUNTIME_PI_AGENT_ENABLED" = "true" || { echo "PI_AGENT_ENABLED must be true before device Agent rollout"; exit 1; }
            test "$RUNTIME_DEVICE_AGENT_GATEWAY_ENABLED" = "true" || { echo "DEVICE_AGENT_GATEWAY_ENABLED must be true before device Agent rollout"; exit 1; }
            test "$RUNTIME_DEVICE_AGENT_FALLBACK_ENABLED" = "true" || { echo "DEVICE_AGENT_FALLBACK_ENABLED must be true before primary rollout"; exit 1; }
            test "$RUNTIME_DEVICE_AGENT_ROLLOUT_REQUIRE_SHADOW_READY" = "true" || { echo "production primary rollout must enforce shadow readiness"; exit 1; }
            case "$RUNTIME_RN_DEVICE_AGENT_ROLLOUT_PERCENTAGE" in
              ''|*[!0-9]*) echo "RN_DEVICE_AGENT_ROLLOUT_PERCENTAGE must be an integer from 0 to 100"; exit 1 ;;
            esac
            test "$RUNTIME_RN_DEVICE_AGENT_ROLLOUT_PERCENTAGE" -le 100 || { echo "RN_DEVICE_AGENT_ROLLOUT_PERCENTAGE must not exceed 100"; exit 1; }
            if [ "$RUNTIME_RN_DEVICE_AGENT_ROLLOUT_PERCENTAGE" -eq 0 ] && [ -z "$RUNTIME_DEVICE_AGENT_ROLLOUT_ALLOWLIST" ]; then
              echo "primary rollout requires a positive percentage or an explicit device allowlist"
              exit 1
            fi
            test -n "$RUNTIME_DEVICE_AGENT_RUNTIME_VERSION" || { echo "DEVICE_AGENT_RUNTIME_VERSION is required"; exit 1; }
            test -n "$RUNTIME_DEVICE_AGENT_MODEL_ALIAS" || { echo "DEVICE_AGENT_MODEL_ALIAS is required"; exit 1; }
            test -n "$RUNTIME_DEVICE_AGENT_POLICY_VERSION" || { echo "DEVICE_AGENT_POLICY_VERSION is required"; exit 1; }
          fi
          if [ "$RUNTIME_DEVICE_AGENT_GATEWAY_ENABLED" = "true" ]; then
            if [ "$RUNTIME_RN_DEVICE_AGENT_ROLLOUT_ENABLED" != "true" ] && [ "$RUNTIME_DEVICE_AGENT_SHADOW_ENABLED" != "true" ]; then
              echo "device Agent gateway requires primary rollout or shadow mode"
              exit 1
            fi
            test -n "$RUNTIME_DEVICE_AGENT_GATEWAY_API_KEY" || { echo "DEVICE_AGENT_GATEWAY_API_KEY secret is required"; exit 1; }
            test -n "$RUNTIME_DEVICE_AGENT_GATEWAY_PROVIDER" || { echo "DEVICE_AGENT_GATEWAY_PROVIDER is required"; exit 1; }
            test -n "$RUNTIME_DEVICE_AGENT_GATEWAY_MODEL" || { echo "DEVICE_AGENT_GATEWAY_MODEL is required"; exit 1; }
            case "$RUNTIME_DEVICE_AGENT_GATEWAY_BASE_URL" in
              https://*) ;;
              *) echo "DEVICE_AGENT_GATEWAY_BASE_URL must use https"; exit 1 ;;
            esac
          fi
          if [ "$RUNTIME_DEVICE_AGENT_SHADOW_ENABLED" = "true" ]; then
            test "$RUNTIME_DEVICE_AGENT_GATEWAY_ENABLED" = "true" || { echo "DEVICE_AGENT_GATEWAY_ENABLED must be true before device Agent shadow mode"; exit 1; }
          fi
          if [ "$RUNTIME_DEVICE_AGENT_FALLBACK_ENABLED" = "true" ]; then
            test "$RUNTIME_RN_DEVICE_AGENT_ROLLOUT_ENABLED" = "true" || { echo "RN_DEVICE_AGENT_ROLLOUT_ENABLED must be true before device Agent fallback"; exit 1; }
            test "$RUNTIME_PI_AGENT_ENABLED" = "true" || { echo "PI_AGENT_ENABLED must be true before device Agent fallback"; exit 1; }
            test -n "$RUNTIME_PI_AGENT_PROVIDER" || { echo "PI_AGENT_PROVIDER is required for device Agent fallback"; exit 1; }
            test -n "$RUNTIME_PI_AGENT_MODEL" || { echo "PI_AGENT_MODEL is required for device Agent fallback"; exit 1; }
            if [ "$RUNTIME_PI_AGENT_PROVIDER" = "openai" ]; then
              if [ -z "$RUNTIME_PI_AGENT_API_KEY" ] && [ -z "$RUNTIME_OPENAI_API_KEY" ]; then
                echo "PI_AGENT_API_KEY or OPENAI_API_KEY is required for OpenAI device Agent fallback"
                exit 1
              fi
            else
              test -n "$RUNTIME_PI_AGENT_API_KEY" || { echo "PI_AGENT_API_KEY is required for device Agent fallback"; exit 1; }
            fi
          fi
          if [ "$RUNTIME_INTERACTIVE_AGENT_BETA_ENABLED" = "true" ] || [ "$RUNTIME_INTERACTIVE_AGENT_GATEWAY_ENABLED" = "true" ] || [ "$RUNTIME_INTERACTIVE_AGENT_EXTERNAL_ACTIONS_ENABLED" = "true" ]; then
            test "$RUNTIME_INTERACTIVE_AGENT_BETA_ENABLED" = "true" || { echo "INTERACTIVE_AGENT_BETA_ENABLED must be true with its gateway"; exit 1; }
            test "$RUNTIME_INTERACTIVE_AGENT_GATEWAY_ENABLED" = "true" || { echo "INTERACTIVE_AGENT_GATEWAY_ENABLED must be true for the interactive beta"; exit 1; }
            test "$RUNTIME_RN_SYNC_ROLLOUT_ENABLED" = "true" || { echo "RN_SYNC_ROLLOUT_ENABLED must be true for local interactive tools"; exit 1; }
            test -n "$RUNTIME_INTERACTIVE_AGENT_DEVICE_ALLOWLIST" || { echo "INTERACTIVE_AGENT_DEVICE_ALLOWLIST is required for the internal beta"; exit 1; }
            case "$RUNTIME_INTERACTIVE_AGENT_BETA_MONTHLY_TURN_LIMIT" in
              ''|*[!0-9]*) echo "INTERACTIVE_AGENT_BETA_MONTHLY_TURN_LIMIT must be a positive integer"; exit 1 ;;
            esac
            test "$RUNTIME_INTERACTIVE_AGENT_BETA_MONTHLY_TURN_LIMIT" -gt 0 || { echo "interactive Agent beta turn limit must be positive"; exit 1; }
            test -n "$RUNTIME_INTERACTIVE_AGENT_RUNTIME_VERSION" || { echo "INTERACTIVE_AGENT_RUNTIME_VERSION is required"; exit 1; }
            test -n "$RUNTIME_INTERACTIVE_AGENT_MODEL_ALIAS" || { echo "INTERACTIVE_AGENT_MODEL_ALIAS is required"; exit 1; }
            test -n "$RUNTIME_INTERACTIVE_AGENT_POLICY_VERSION" || { echo "INTERACTIVE_AGENT_POLICY_VERSION is required"; exit 1; }
            case "$RUNTIME_INTERACTIVE_AGENT_SCHEMA_VERSION:$RUNTIME_INTERACTIVE_AGENT_POLICY_VERSION" in
              1:interactive-read-only-v1|2:interactive-internal-v2) ;;
              3:interactive-approved-send-v3)
                test "$RUNTIME_INTERACTIVE_AGENT_EXTERNAL_ACTIONS_ENABLED" = "true" || { echo "schema v3 requires INTERACTIVE_AGENT_EXTERNAL_ACTIONS_ENABLED=true"; exit 1; }
                test "$RUNTIME_IM_SEND_ENABLED" = "true" || { echo "schema v3 requires IM_SEND_ENABLED=true"; exit 1; }
                ;;
              *) echo "INTERACTIVE_AGENT_SCHEMA_VERSION and INTERACTIVE_AGENT_POLICY_VERSION must be a reviewed pair"; exit 1 ;;
            esac
            if [ "$RUNTIME_INTERACTIVE_AGENT_EXTERNAL_ACTIONS_ENABLED" = "true" ]; then
              test "$RUNTIME_INTERACTIVE_AGENT_SCHEMA_VERSION:$RUNTIME_INTERACTIVE_AGENT_POLICY_VERSION" = "3:interactive-approved-send-v3" || { echo "external actions require the reviewed schema v3 pair"; exit 1; }
              test "$RUNTIME_IM_SEND_ENABLED" = "true" || { echo "external actions require IM_SEND_ENABLED=true"; exit 1; }
            fi
            test -n "$RUNTIME_DEVICE_AGENT_GATEWAY_API_KEY" || { echo "DEVICE_AGENT_GATEWAY_API_KEY secret is required for the interactive gateway"; exit 1; }
            test -n "$RUNTIME_DEVICE_AGENT_GATEWAY_PROVIDER" || { echo "DEVICE_AGENT_GATEWAY_PROVIDER is required for the interactive gateway"; exit 1; }
            test -n "$RUNTIME_DEVICE_AGENT_GATEWAY_MODEL" || { echo "DEVICE_AGENT_GATEWAY_MODEL is required for the interactive gateway"; exit 1; }
            case "$RUNTIME_DEVICE_AGENT_GATEWAY_BASE_URL" in
              https://*) ;;
              *) echo "DEVICE_AGENT_GATEWAY_BASE_URL must use https for the interactive gateway"; exit 1 ;;
            esac
          fi
          if [ -n "$RUNTIME_RESEND_API_KEY" ]; then
            echo "Resend SMTP is configured."
          else
            echo "RESEND_API_KEY is not configured; password reset endpoints will fail closed."
          fi
          case " $VPS_COMPOSE_SERVICES " in
            *" cloudflared "*)
              test -n "$CLOUDFLARE_TUNNEL_TOKEN" || { echo "CLOUDFLARE_TUNNEL_TOKEN secret is required when deploying cloudflared"; exit 1; }
              ;;
          esac
          if [ "$RUNTIME_AI_ENABLED" = "true" ]; then
            case "$RUNTIME_LITELLM_MODEL" in
              deepseek/*)
                test -n "$RUNTIME_DEEPSEEK_API_KEY" || { echo "DEEPSEEK_API_KEY secret is required for the configured LiteLLM model"; exit 1; }
                ;;
              openai/*)
                test -n "$RUNTIME_OPENAI_API_KEY" || { echo "OPENAI_API_KEY secret is required for the configured LiteLLM model"; exit 1; }
                ;;
            esac
          fi
          test -n "$RUNTIME_REVENUECAT_SECRET_API_KEY" || { echo "REVENUECAT_SECRET_API_KEY secret is required"; exit 1; }
          test -n "$RUNTIME_REVENUECAT_WEBHOOK_HMAC_SECRET" || { echo "REVENUECAT_WEBHOOK_HMAC_SECRET secret is required"; exit 1; }
          case "$VPS_DEPLOY_DIR" in
