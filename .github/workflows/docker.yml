name: Docker Build

on:
  push:
    branches: [main, master, strategic-reset-message-sop-slim]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build:
    name: Build Slim Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: im-slim-api:ci

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: web
          file: web/Dockerfile
          push: false
          tags: im-slim-web:ci
