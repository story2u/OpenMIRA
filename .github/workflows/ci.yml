name: CI

on:
  push:
    branches: ["release/v*.*.*", "features/**"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  harness:
    name: Harness And Architecture
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate repository harness
        run: make harness-check

  backend:
    name: Backend Test And Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: imtest
          POSTGRES_PASSWORD: imtest
          POSTGRES_DB: imtest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U imtest -d imtest"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://imtest:imtest@127.0.0.1:5432/imtest
      SUBSCRIPTION_TEST_DATABASE_URL: postgresql+asyncpg://imtest:imtest@127.0.0.1:5432/imtest
      ADMIN_API_TOKEN: ci-test-token
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install backend dependencies
        run: uv sync --locked --dev

      - name: Check Python syntax
        run: uv run --locked python -m compileall -q app tests scripts alembic

      - name: Run backend lint
        run: uv run --locked ruff check app tests scripts alembic --select E,F,ASYNC --ignore E501

      - name: Check OpenAPI snapshot
        run: uv run --locked python scripts/export_openapi.py ../packages/radar-contracts/openapi.json --check

      - name: Apply database migrations
        run: uv run --locked alembic upgrade head

      - name: Verify latest migration rollback
        run: |
          uv run --locked alembic downgrade -1
          uv run --locked alembic upgrade head

      - name: Run backend tests
        run: uv run --locked pytest -q

      - name: Run job discovery deterministic evaluation
        run: uv run --locked python ../evals/job-discovery/evaluate.py

  pi-agent:
    name: Pi Agent Runtime
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend/pi-agent-runtime
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/pi-agent-runtime/package-lock.json

      - name: Install runtime dependencies
        run: npm ci --ignore-scripts

      - name: Check runtime syntax
        run: npm run check

      - name: Run runtime tests
        run: npm test

  frontend:
    name: Web Shared Packages And RN JS
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JS workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Check generated TypeScript contracts
        run: pnpm --dir packages/radar-contracts check

      - name: Check shared runtime packages
        run: |
          pnpm --dir packages/radar-core check
          pnpm --dir packages/radar-api check
          pnpm --dir packages/radar-agent check

      - name: Check RN JavaScript and Hermes bundles
        run: |
          pnpm check:radar
          pnpm --dir mobile/radar export:ios
          pnpm --dir mobile/radar export:android

      - name: Run frontend lint
        run: pnpm --dir frontend lint

      - name: Run frontend typecheck
        run: pnpm --dir frontend typecheck

      - name: Run frontend tests
        run: pnpm --dir frontend test

      - name: Build frontend
        run: pnpm --dir frontend build

  rn-ios:
    name: RN iOS Release Build
    runs-on: macos-15
    timeout-minutes: 40
    env:
      RADAR_APP_VARIANT: production
      RADAR_APP_VERSION: 1.0.0
      RADAR_BUILD_NUMBER: 2
      EXPO_PUBLIC_API_BASE_URL: https://api.example.test
      EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: 1234567890-ci-server.apps.googleusercontent.com
      EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID: 1234567890-ci-ios.apps.googleusercontent.com
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Generate RN iOS project
        run: pnpm --dir mobile/radar exec expo prebuild --clean --platform ios
      - name: Build RN iOS release
        run: |
          xcodebuild -quiet \
            -workspace mobile/radar/ios/app.xcworkspace \
            -scheme app \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath mobile/radar/.build/DerivedData \
            CODE_SIGNING_ALLOWED=NO build

  rn-android:
    name: RN Android Release Build
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      RADAR_APP_VARIANT: production
      RADAR_APP_VERSION: 1.0.0
      RADAR_BUILD_NUMBER: 2
      EXPO_PUBLIC_API_BASE_URL: https://api.example.test
      EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: 1234567890-ci-server.apps.googleusercontent.com
      EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID: 1234567890-ci-ios.apps.googleusercontent.com
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - run: pnpm install --frozen-lockfile
      - name: Generate RN Android project
        run: pnpm --dir mobile/radar exec expo prebuild --clean --platform android
      - name: Build RN Android release
        working-directory: mobile/radar/android
        env:
          NODE_ENV: production
        run: ./gradlew :app:assembleRelease

  ios:
    name: iOS Build And Test
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Generate project
        run: cd mobile/ios && xcodegen generate
      - name: Ensure iOS 18.5 simulator runtime
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
          if ! xcrun simctl list runtimes | grep -q 'iOS 18.5'; then
            sudo xcodebuild -downloadPlatform iOS
          fi
          xcrun simctl list devices available
      - name: Build and test
        run: |
          cd mobile/ios
          xcodebuild test -project OpportunityRadar.xcodeproj -scheme OpportunityRadar \
            -destination 'platform=iOS Simulator,OS=18.5,name=iPhone 16' \
            -derivedDataPath .build/DerivedData CODE_SIGNING_ALLOWED=NO

  android:
    name: Android Lint Test And Assemble
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - name: Check Android app
        run: make android-check
