name: CI

on:
  push:
    branches: ["release/v*.*.*"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  harness:
    name: Harness And Architecture
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate repository harness
        run: make harness-check

  backend:
    name: Backend Test And Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: imtest
          POSTGRES_PASSWORD: imtest
          POSTGRES_DB: imtest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U imtest -d imtest"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://imtest:imtest@127.0.0.1:5432/imtest
      SUBSCRIPTION_TEST_DATABASE_URL: postgresql+asyncpg://imtest:imtest@127.0.0.1:5432/imtest
      ADMIN_API_TOKEN: ci-test-token
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install backend dependencies
        run: uv sync --locked --dev

      - name: Check Python syntax
        run: uv run --locked python -m compileall -q app tests scripts alembic

      - name: Run backend lint
        run: uv run --locked ruff check app tests scripts alembic --select E,F,ASYNC --ignore E501

      - name: Apply database migrations
        run: uv run --locked alembic upgrade head

      - name: Run backend tests
        run: uv run --locked pytest -q

  pi-agent:
    name: Pi Agent Runtime
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend/pi-agent-runtime
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/pi-agent-runtime/package-lock.json

      - name: Install runtime dependencies
        run: npm ci --ignore-scripts

      - name: Check runtime syntax
        run: npm run check

      - name: Run runtime tests
        run: npm test

  frontend:
    name: Frontend Typecheck And Build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend lint
        run: pnpm lint

      - name: Run frontend typecheck
        run: pnpm typecheck

      - name: Build frontend
        run: pnpm build
