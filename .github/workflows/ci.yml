name: CI

on:
  push:
    branches: [main, master, strategic-reset-message-sop-slim]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  slim-gate:
    name: Slim Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm --prefix web ci

      - name: Run slim gate
        run: sh scripts/slim_gate.sh
