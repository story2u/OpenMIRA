x-app-build: &app-build
  context: ..
  dockerfile: backend/Dockerfile

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: im_assistant
      POSTGRES_USER: im_user
      POSTGRES_PASSWORD: im_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U im_user -d im_assistant"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    build: *app-build
    command: alembic upgrade head
    environment: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api:
    build: *app-build
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment: *app-env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      migrate:
        condition: service_completed_successfully

  celery_worker:
    build: *app-build
    command: celery -A app.worker.celery_app:celery_app worker -l INFO -Q default,im,ai,agent
    environment: *app-env
    volumes:
      - .:/app
    depends_on:
      migrate:
        condition: service_completed_successfully

  celery_beat:
    build: *app-build
    command: celery -A app.worker.celery_app:celery_app beat -l INFO --schedule=/tmp/celerybeat-schedule
    environment: *app-env
    volumes:
      - .:/app
    depends_on:
      migrate:
        condition: service_completed_successfully

  telegram_listener:
    build: *app-build
    command: python -m app.worker.telegram_listener
    environment: *app-env
    volumes:
      - .:/app
    depends_on:
      migrate:
        condition: service_completed_successfully

  telegram_mtproto_qr_worker:
    build: *app-build
    command: python -m app.worker.telegram_mtproto_qr_worker
    environment: *app-env
    volumes:
      - .:/app
    depends_on:
      migrate:
        condition: service_completed_successfully

  telegram_mtproto_listener:
    build: *app-build
    command: python -m app.worker.telegram_mtproto_listener
    environment: *app-env
    volumes:
      - .:/app
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
  redis_data:
