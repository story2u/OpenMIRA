x-app-env: &app-env
  APP_ENV: local
  APP_NAME: Opportunity IM Assistant API
  DEBUG: "true"
  DATABASE_URL: postgresql+asyncpg://im_user:im_password@postgres:5432/im_assistant
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  ADMIN_API_TOKEN: change-me
  JWT_SECRET_KEY: change-me-with-a-long-random-string
  ACCESS_TOKEN_EXPIRE_MINUTES: "10080"
  PASSWORD_LOGIN_MAX_ATTEMPTS: ${PASSWORD_LOGIN_MAX_ATTEMPTS:-5}
  PASSWORD_LOGIN_WINDOW_SECONDS: ${PASSWORD_LOGIN_WINDOW_SECONDS:-300}
  PASSWORD_RESET_ENABLED: ${PASSWORD_RESET_ENABLED:-true}
  PASSWORD_RESET_TTL_MINUTES: ${PASSWORD_RESET_TTL_MINUTES:-15}
  PASSWORD_RESET_MAX_ATTEMPTS: ${PASSWORD_RESET_MAX_ATTEMPTS:-5}
  PASSWORD_RESET_REQUEST_LIMIT: ${PASSWORD_RESET_REQUEST_LIMIT:-3}
  PASSWORD_RESET_REQUEST_WINDOW_SECONDS: ${PASSWORD_RESET_REQUEST_WINDOW_SECONDS:-900}
  PASSWORD_RESET_VERIFY_LIMIT: ${PASSWORD_RESET_VERIFY_LIMIT:-10}
  PASSWORD_RESET_VERIFY_WINDOW_SECONDS: ${PASSWORD_RESET_VERIFY_WINDOW_SECONDS:-900}
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USERNAME: ${SMTP_USERNAME:-}
  SMTP_PASSWORD: ${SMTP_PASSWORD:-}
  SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
  SMTP_FROM_NAME: ${SMTP_FROM_NAME:-商机雷达}
  SMTP_STARTTLS: ${SMTP_STARTTLS:-true}
  SMTP_USE_TLS: ${SMTP_USE_TLS:-false}
  SMTP_TIMEOUT_SECONDS: ${SMTP_TIMEOUT_SECONDS:-10}
  FRONTEND_BASE_URL: http://localhost:3000
  CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
  GOOGLE_OAUTH_CLIENT_ID: ""
  GOOGLE_OAUTH_CLIENT_SECRET: ""
  GOOGLE_OAUTH_REDIRECT_URI: http://localhost:8000/api/v1/auth/oauth/google/callback
  APPLE_OAUTH_CLIENT_ID: ""
  APPLE_OAUTH_CLIENT_SECRET: ""
  APPLE_OAUTH_REDIRECT_URI: http://localhost:8000/api/v1/auth/oauth/apple/callback
  APPLE_OAUTH_TEAM_ID: ""
  APPLE_OAUTH_KEY_ID: ""
  APPLE_OAUTH_PRIVATE_KEY: ""
  DEFAULT_TIMEZONE: Asia/Shanghai
  DEFAULT_WORKDAYS: "[1,2,3,4,5]"
  DEFAULT_WORK_START: "09:00"
  DEFAULT_WORK_END: "18:30"
  PENDING_HUMAN_SLA_MINUTES: "30"
  IM_SEND_ENABLED: "true"
  TELEGRAM_BOT_TOKEN: change-me
  TELEGRAM_WEBHOOK_SECRET: change-me
  TELEGRAM_BOT_USERNAME: im_assistant_local_bot
  TELEGRAM_WEBHOOK_URL: ""
  TELEGRAM_INTEGRATION_MODE: mock
  TELEGRAM_CONNECT_TTL_SECONDS: 600
  TELEGRAM_MTPROTO_QR_ENABLED: "false"
  TELEGRAM_MTPROTO_QR_WORKER_ENABLED: "false"
  TELEGRAM_MTPROTO_API_ID: ""
  TELEGRAM_MTPROTO_API_HASH: ""
  WECOM_CORP_ID: change-me
  WECOM_AGENT_ID: "1000001"
  WECOM_SECRET: change-me
  WECOM_TOKEN: change-me
  WECOM_AES_KEY: change-me
  WECOM_ARCHIVE_ENABLED: ${WECOM_ARCHIVE_ENABLED:-false}
  WECOM_ARCHIVE_SDK_PATH: ${WECOM_ARCHIVE_SDK_PATH:-/opt/wecom-finance-sdk/libWeWorkFinanceSdk_C.so}
  LD_LIBRARY_PATH: /opt/wecom-finance-sdk
  WECOM_ARCHIVE_POLL_INTERVAL_SECONDS: ${WECOM_ARCHIVE_POLL_INTERVAL_SECONDS:-10}
  WECOM_ARCHIVE_BATCH_SIZE: ${WECOM_ARCHIVE_BATCH_SIZE:-100}
  WECOM_ARCHIVE_SDK_TIMEOUT_SECONDS: ${WECOM_ARCHIVE_SDK_TIMEOUT_SECONDS:-5}
  WECOM_ARCHIVE_LEASE_SECONDS: ${WECOM_ARCHIVE_LEASE_SECONDS:-120}
  AI_ENABLED: "true"
  LITELLM_MODEL: openai/gpt-4o-mini
  AI_AUTO_REPLY_ENABLED: "true"
  AI_AUTO_REPLY_MIN_CONFIDENCE: "0.85"
  AI_AUTO_REPLY_COOLDOWN_MINUTES: "720"
  AI_AUTO_REPLY_WINDOW_HOURS: "24"
  AI_AUTO_REPLY_MAX_PER_WINDOW: "1"
  AI_AUTO_REPLY_MAX_CHARS: "240"
  OPENAI_API_KEY: change-me
  DEEPSEEK_API_KEY: ""
  PI_AGENT_ENABLED: "true"
  PI_AGENT_PROVIDER: openai
  PI_AGENT_MODEL: gpt-4o-mini
  PI_AGENT_API_KEY: ""
  PI_AGENT_NODE_BINARY: node
  PI_AGENT_RUNNER_PATH: /app/pi-agent-runtime/src/index.mjs
  PI_AGENT_TIMEOUT_SECONDS: "60"
  PI_AGENT_MIN_OPPORTUNITY_CONFIDENCE: "0.75"
  PI_AGENT_MAX_LINKS: "5"
  PI_AGENT_LINK_TIMEOUT_SECONDS: "10"
  PI_AGENT_MAX_CONTENT_BYTES: "200000"
  PI_AGENT_MAX_LINK_TEXT_CHARS: "12000"
  REVENUECAT_ENABLED: ${REVENUECAT_ENABLED:-true}
  REVENUECAT_SECRET_API_KEY: ${REVENUECAT_SECRET_API_KEY:-}
  REVENUECAT_PROJECT_ID: ${REVENUECAT_PROJECT_ID:-}
  REVENUECAT_WEBHOOK_AUTH_TOKEN: ${REVENUECAT_WEBHOOK_AUTH_TOKEN:-}
  REVENUECAT_WEBHOOK_HMAC_SECRET: ${REVENUECAT_WEBHOOK_HMAC_SECRET:-}
  REVENUECAT_WEBHOOK_TOLERANCE_SECONDS: ${REVENUECAT_WEBHOOK_TOLERANCE_SECONDS:-300}
  REVENUECAT_SYNC_TIMEOUT_SECONDS: ${REVENUECAT_SYNC_TIMEOUT_SECONDS:-10}
  REVENUECAT_SYNC_RATE_LIMIT_SECONDS: ${REVENUECAT_SYNC_RATE_LIMIT_SECONDS:-30}
  REVENUECAT_RECONCILE_ENABLED: ${REVENUECAT_RECONCILE_ENABLED:-true}
  REVENUECAT_RECONCILE_INTERVAL_HOURS: ${REVENUECAT_RECONCILE_INTERVAL_HOURS:-24}
  REVENUECAT_RECONCILE_BATCH_SIZE: ${REVENUECAT_RECONCILE_BATCH_SIZE:-100}
  REVENUECAT_ENTITLEMENT_PLUS: ${REVENUECAT_ENTITLEMENT_PLUS:-plus}
  REVENUECAT_ENTITLEMENT_PRO: ${REVENUECAT_ENTITLEMENT_PRO:-pro}
  REVENUECAT_ENTITLEMENT_MAX: ${REVENUECAT_ENTITLEMENT_MAX:-max}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: im_assistant
      POSTGRES_USER: im_user
      POSTGRES_PASSWORD: im_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U im_user -d im_assistant"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    build: .
    command: alembic upgrade head
    environment: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment: *app-env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ${WECOM_ARCHIVE_SDK_DIR:-./vendor/wecom-finance-sdk}:/opt/wecom-finance-sdk:ro
    depends_on:
      migrate:
        condition: service_completed_successfully

  celery_worker:
    build: .
    command: celery -A app.worker.celery_app:celery_app worker -l INFO -Q default,im,ai,agent
    environment: *app-env
    volumes:
      - .:/app
    depends_on:
      migrate:
        condition: service_completed_successfully

  celery_beat:
    build: .
    command: celery -A app.worker.celery_app:celery_app beat -l INFO --schedule=/tmp/celerybeat-schedule
    environment: *app-env
    volumes:
      - .:/app
    depends_on:
      migrate:
        condition: service_completed_successfully

  wecom_archive_worker:
    build: .
    command: celery -A app.worker.celery_app:celery_app worker -l INFO -Q wecom_archive --concurrency=1
    environment: *app-env
    volumes:
      - .:/app
      - ${WECOM_ARCHIVE_SDK_DIR:-./vendor/wecom-finance-sdk}:/opt/wecom-finance-sdk:ro
    depends_on:
      migrate:
        condition: service_completed_successfully

  telegram_listener:
    build: .
    command: python -m app.worker.telegram_listener
    environment: *app-env
    volumes:
      - .:/app
    depends_on:
      migrate:
        condition: service_completed_successfully

  telegram_mtproto_qr_worker:
    build: .
    command: python -m app.worker.telegram_mtproto_qr_worker
    environment: *app-env
    volumes:
      - .:/app
    depends_on:
      migrate:
        condition: service_completed_successfully

  telegram_mtproto_listener:
    build: .
    command: python -m app.worker.telegram_mtproto_listener
    environment: *app-env
    volumes:
      - .:/app
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
  redis_data:
