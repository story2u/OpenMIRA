  WECOM_AGENT_ID: ${WECOM_AGENT_ID:-1000001}
  WECOM_SECRET: ${WECOM_SECRET:-change-me}
  WECOM_TOKEN: ${WECOM_TOKEN:-change-me}
  WECOM_AES_KEY: ${WECOM_AES_KEY:-change-me}
  WECOM_ARCHIVE_ENABLED: ${WECOM_ARCHIVE_ENABLED:-false}
  WECOM_ARCHIVE_SDK_PATH: ${WECOM_ARCHIVE_SDK_PATH:-/opt/wecom-finance-sdk/libWeWorkFinanceSdk_C.so}
  LD_LIBRARY_PATH: /opt/wecom-finance-sdk
  WECOM_ARCHIVE_POLL_INTERVAL_SECONDS: ${WECOM_ARCHIVE_POLL_INTERVAL_SECONDS:-10}
  WECOM_ARCHIVE_BATCH_SIZE: ${WECOM_ARCHIVE_BATCH_SIZE:-100}
  WECOM_ARCHIVE_SDK_TIMEOUT_SECONDS: ${WECOM_ARCHIVE_SDK_TIMEOUT_SECONDS:-5}
  WECOM_ARCHIVE_LEASE_SECONDS: ${WECOM_ARCHIVE_LEASE_SECONDS:-120}
  AI_ENABLED: ${AI_ENABLED:-false}
  LITELLM_MODEL: ${LITELLM_MODEL:-openai/gpt-4o-mini}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-change-me}
  DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
  PI_AGENT_ENABLED: ${PI_AGENT_ENABLED:-true}
  PI_AGENT_PROVIDER: ${PI_AGENT_PROVIDER:-openai}
  PI_AGENT_MODEL: ${PI_AGENT_MODEL:-gpt-4o-mini}
  PI_AGENT_API_KEY: ${PI_AGENT_API_KEY:-}
  PI_AGENT_NODE_BINARY: ${PI_AGENT_NODE_BINARY:-node}
  PI_AGENT_RUNNER_PATH: ${PI_AGENT_RUNNER_PATH:-/app/pi-agent-runtime/src/index.mjs}
  PI_AGENT_TIMEOUT_SECONDS: ${PI_AGENT_TIMEOUT_SECONDS:-60}
  PI_AGENT_MIN_OPPORTUNITY_CONFIDENCE: ${PI_AGENT_MIN_OPPORTUNITY_CONFIDENCE:-0.75}
  PI_AGENT_MAX_LINKS: ${PI_AGENT_MAX_LINKS:-5}
  PI_AGENT_LINK_TIMEOUT_SECONDS: ${PI_AGENT_LINK_TIMEOUT_SECONDS:-10}
  PI_AGENT_MAX_CONTENT_BYTES: ${PI_AGENT_MAX_CONTENT_BYTES:-200000}
  PI_AGENT_MAX_LINK_TEXT_CHARS: ${PI_AGENT_MAX_LINK_TEXT_CHARS:-12000}
  REVENUECAT_ENABLED: ${REVENUECAT_ENABLED:-true}
  REVENUECAT_SECRET_API_KEY: ${REVENUECAT_SECRET_API_KEY:-}
  REVENUECAT_PROJECT_ID: ${REVENUECAT_PROJECT_ID:-}
  REVENUECAT_WEBHOOK_AUTH_TOKEN: ${REVENUECAT_WEBHOOK_AUTH_TOKEN:-}
  REVENUECAT_WEBHOOK_HMAC_SECRET: ${REVENUECAT_WEBHOOK_HMAC_SECRET:-}
  REVENUECAT_WEBHOOK_TOLERANCE_SECONDS: ${REVENUECAT_WEBHOOK_TOLERANCE_SECONDS:-300}
  REVENUECAT_SYNC_TIMEOUT_SECONDS: ${REVENUECAT_SYNC_TIMEOUT_SECONDS:-10}
  REVENUECAT_SYNC_RATE_LIMIT_SECONDS: ${REVENUECAT_SYNC_RATE_LIMIT_SECONDS:-30}
  REVENUECAT_RECONCILE_ENABLED: ${REVENUECAT_RECONCILE_ENABLED:-true}
  REVENUECAT_RECONCILE_INTERVAL_HOURS: ${REVENUECAT_RECONCILE_INTERVAL_HOURS:-24}
  REVENUECAT_RECONCILE_BATCH_SIZE: ${REVENUECAT_RECONCILE_BATCH_SIZE:-100}
  REVENUECAT_ENTITLEMENT_PLUS: ${REVENUECAT_ENTITLEMENT_PLUS:-plus}
  REVENUECAT_ENTITLEMENT_PRO: ${REVENUECAT_ENTITLEMENT_PRO:-pro}
  REVENUECAT_ENTITLEMENT_MAX: ${REVENUECAT_ENTITLEMENT_MAX:-max}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-im_assistant}
      POSTGRES_USER: ${POSTGRES_USER:-im_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-im_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-im_user} -d ${POSTGRES_DB:-im_assistant}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    image: ${BACKEND_IMAGE:-ghcr.io/story2u/im-backend:latest}
    restart: "no"
    command: alembic upgrade head
    environment: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api:
    image: ${BACKEND_IMAGE:-ghcr.io/story2u/im-backend:latest}
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment: *app-env
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ${WECOM_ARCHIVE_SDK_DIR:-./vendor/wecom-finance-sdk}:/opt/wecom-finance-sdk:ro
    depends_on:
      migrate:
        condition: service_completed_successfully

  celery_worker:
    image: ${BACKEND_IMAGE:-ghcr.io/story2u/im-backend:latest}
    restart: unless-stopped
    command: celery -A app.worker.celery_app:celery_app worker -l INFO -Q default,im,ai,agent
    environment: *app-env
    depends_on:
      migrate:
        condition: service_completed_successfully

  celery_beat:
    image: ${BACKEND_IMAGE:-ghcr.io/story2u/im-backend:latest}
    restart: unless-stopped
    command: celery -A app.worker.celery_app:celery_app beat -l INFO --schedule=/tmp/celerybeat-schedule
    environment: *app-env
    depends_on:
      migrate:
        condition: service_completed_successfully

  wecom_archive_worker:
    image: ${BACKEND_IMAGE:-ghcr.io/story2u/im-backend:latest}
    restart: unless-stopped
    command: celery -A app.worker.celery_app:celery_app worker -l INFO -Q wecom_archive --concurrency=1
    environment: *app-env
    volumes:
      - ${WECOM_ARCHIVE_SDK_DIR:-./vendor/wecom-finance-sdk}:/opt/wecom-finance-sdk:ro
    depends_on:
      migrate:
        condition: service_completed_successfully

  telegram_listener:
    image: ${BACKEND_IMAGE:-ghcr.io/story2u/im-backend:latest}
    restart: unless-stopped
    command: python -m app.worker.telegram_listener
    environment: *app-env
    depends_on:
      migrate:
        condition: service_completed_successfully

  telegram_mtproto_qr_worker:
    image: ${BACKEND_IMAGE:-ghcr.io/story2u/im-backend:latest}
    restart: unless-stopped
    command: python -m app.worker.telegram_mtproto_qr_worker
    environment: *app-env
    depends_on:
      migrate:
        condition: service_completed_successfully

  telegram_mtproto_listener:
    image: ${BACKEND_IMAGE:-ghcr.io/story2u/im-backend:latest}
    restart: unless-stopped
    command: python -m app.worker.telegram_mtproto_listener
    environment: *app-env
    depends_on:
      migrate:
        condition: service_completed_successfully

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/story2u/im-frontend:latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      INTERNAL_API_BASE_URL: http://api:8000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_started

  cloudflared:
    image: ${CLOUDFLARED_IMAGE:-cloudflare/cloudflared:latest}
    restart: unless-stopped
    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token
      - ${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN is required}
    depends_on:
      api:
        condition: service_started
      frontend:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
