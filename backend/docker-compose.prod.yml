  APPLE_OAUTH_CLIENT_ID: ${APPLE_OAUTH_CLIENT_ID:-}
  APPLE_OAUTH_CLIENT_SECRET: ${APPLE_OAUTH_CLIENT_SECRET:-}
  APPLE_OAUTH_REDIRECT_URI: ${APPLE_OAUTH_REDIRECT_URI:-https://im.story2u.xyz/api/v1/auth/oauth/apple/callback}
  APPLE_OAUTH_TEAM_ID: ${APPLE_OAUTH_TEAM_ID:-}
  APPLE_OAUTH_KEY_ID: ${APPLE_OAUTH_KEY_ID:-}
  APPLE_OAUTH_PRIVATE_KEY: ${APPLE_OAUTH_PRIVATE_KEY:-}
  DEFAULT_TIMEZONE: ${DEFAULT_TIMEZONE:-Asia/Shanghai}
  DEFAULT_WORKDAYS: ${DEFAULT_WORKDAYS:-[1,2,3,4,5]}
  DEFAULT_WORK_START: ${DEFAULT_WORK_START:-09:00}
  DEFAULT_WORK_END: ${DEFAULT_WORK_END:-18:30}
  PENDING_HUMAN_SLA_MINUTES: ${PENDING_HUMAN_SLA_MINUTES:-30}
  IM_SEND_ENABLED: ${IM_SEND_ENABLED:-false}
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-change-me}
  TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-change-me}
  TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
  TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-https://im.story2u.xyz/api/v1/webhooks/telegram}
  TELEGRAM_INTEGRATION_MODE: ${TELEGRAM_INTEGRATION_MODE:-live}
  TELEGRAM_CONNECT_TTL_SECONDS: ${TELEGRAM_CONNECT_TTL_SECONDS:-600}
  TELEGRAM_MTPROTO_QR_ENABLED: ${TELEGRAM_MTPROTO_QR_ENABLED:-false}
  TELEGRAM_MTPROTO_QR_WORKER_ENABLED: ${TELEGRAM_MTPROTO_QR_WORKER_ENABLED:-false}
  TELEGRAM_MTPROTO_API_ID: ${TELEGRAM_MTPROTO_API_ID:-}
  TELEGRAM_MTPROTO_API_HASH: ${TELEGRAM_MTPROTO_API_HASH:-}
