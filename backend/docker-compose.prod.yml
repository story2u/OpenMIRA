  PASSWORD_RESET_ENABLED: ${PASSWORD_RESET_ENABLED:-true}
  PASSWORD_RESET_TTL_MINUTES: ${PASSWORD_RESET_TTL_MINUTES:-15}
  PASSWORD_RESET_MAX_ATTEMPTS: ${PASSWORD_RESET_MAX_ATTEMPTS:-5}
  PASSWORD_RESET_REQUEST_LIMIT: ${PASSWORD_RESET_REQUEST_LIMIT:-3}
  PASSWORD_RESET_REQUEST_WINDOW_SECONDS: ${PASSWORD_RESET_REQUEST_WINDOW_SECONDS:-900}
  PASSWORD_RESET_VERIFY_LIMIT: ${PASSWORD_RESET_VERIFY_LIMIT:-10}
