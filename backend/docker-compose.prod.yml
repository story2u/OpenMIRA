services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-im_assistant}
      POSTGRES_USER: ${POSTGRES_USER:-im_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-im_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-im_user} -d ${POSTGRES_DB:-im_assistant}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    image: ${BACKEND_IMAGE:-ghcr.io/story2u/im-backend:latest}
    restart: "no"
    command: alembic upgrade head
    environment: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api:
    image: ${BACKEND_IMAGE:-ghcr.io/story2u/im-backend:latest}
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment: *app-env
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ${WECOM_ARCHIVE_SDK_DIR:-./vendor/wecom-finance-sdk}:/opt/wecom-finance-sdk:ro
    depends_on:
      migrate:
        condition: service_completed_successfully

  celery_worker:
    image: ${BACKEND_IMAGE:-ghcr.io/story2u/im-backend:latest}
    restart: unless-stopped
    command: celery -A app.worker.celery_app:celery_app worker -l INFO -Q default,im,ai,agent
    environment: *app-env
    depends_on:
      migrate:
        condition: service_completed_successfully

  celery_beat:
    image: ${BACKEND_IMAGE:-ghcr.io/story2u/im-backend:latest}
    restart: unless-stopped
    command: celery -A app.worker.celery_app:celery_app beat -l INFO --schedule=/tmp/celerybeat-schedule
    environment: *app-env
    depends_on:
      migrate:
        condition: service_completed_successfully

  wecom_archive_worker:
    image: ${BACKEND_IMAGE:-ghcr.io/story2u/im-backend:latest}
    restart: unless-stopped
    command: celery -A app.worker.celery_app:celery_app worker -l INFO -Q wecom_archive --concurrency=1
    environment: *app-env
    volumes:
      - ${WECOM_ARCHIVE_SDK_DIR:-./vendor/wecom-finance-sdk}:/opt/wecom-finance-sdk:ro
    depends_on:
      migrate:
        condition: service_completed_successfully

  telegram_listener:
    image: ${BACKEND_IMAGE:-ghcr.io/story2u/im-backend:latest}
    restart: unless-stopped
    command: python -m app.worker.telegram_listener
    environment: *app-env
    depends_on:
      migrate:
        condition: service_completed_successfully

  telegram_mtproto_qr_worker:
    image: ${BACKEND_IMAGE:-ghcr.io/story2u/im-backend:latest}
    restart: unless-stopped
    command: python -m app.worker.telegram_mtproto_qr_worker
    environment: *app-env
    depends_on:
      migrate:
        condition: service_completed_successfully

  telegram_mtproto_listener:
    image: ${BACKEND_IMAGE:-ghcr.io/story2u/im-backend:latest}
    restart: unless-stopped
    command: python -m app.worker.telegram_mtproto_listener
    environment: *app-env
    depends_on:
      migrate:
        condition: service_completed_successfully

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/story2u/im-frontend:latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      INTERNAL_API_BASE_URL: http://api:8000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_started

  cloudflared:
    image: ${CLOUDFLARED_IMAGE:-cloudflare/cloudflared:latest}
    restart: unless-stopped
    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token
      - ${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN is required}
    depends_on:
      api:
        condition: service_started
      frontend:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
