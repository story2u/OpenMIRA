x-go-service: &go-service
  restart: unless-stopped
  depends_on:
    go-redis:
      condition: service_healthy
    go-cache-redis:
      condition: service_healthy
  environment:
    <<: *go-env
  volumes:
    - go-data:/app/data
    - "${VOICE_TRANSCRIPTION_COZE_KEYS_HOST_DIR:-/data/secrets/im}:/app/keys:ro"
  networks:
    - im-go-net

services:
  go-redis:
    image: "${REDIS_IMAGE:-redis:7-alpine}"
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - im-go-net

  go-cache-redis:
    image: "${REDIS_IMAGE:-redis:7-alpine}"
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - im-go-net

  go-api:
    <<: *go-service
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        TARGET_CMD: api
    image: "${GO_API_IMAGE:-im-go-api:${GO_IMAGE_TAG:-latest}}"
    ports:
      - "${GO_BACKEND_BIND_ADDR:-127.0.0.1}:${GO_BACKEND_HOST_PORT:-19000}:9000"
    environment:
      <<: *go-env
      CLOUD_RUNTIME_ROLE: api
      GO_BACKEND_ADDR: ":9000"

  go-web:
    build:
      context: ../../web
      dockerfile: Dockerfile
      args:
        GO_WEB_VERSION: "${GO_WEB_VERSION:-0.1.0-phase1}"
        GO_WEB_COMMIT: "${GO_WEB_COMMIT:-unknown}"
        GO_WEB_BUILD_TIME: "${GO_WEB_BUILD_TIME:-unknown}"
    image: "${GO_WEB_IMAGE:-im-go-web:${GO_IMAGE_TAG:-latest}}"
    restart: unless-stopped
    ports:
      - "${GO_WEB_BIND_ADDR:-127.0.0.1}:${GO_WEB_HOST_PORT:-18080}:3000"
    environment:
      NEXT_PUBLIC_GO_WEB_VERSION: "${GO_WEB_VERSION:-0.1.0-phase1}"
      NEXT_PUBLIC_GO_WEB_COMMIT: "${GO_WEB_COMMIT:-unknown}"
      NEXT_PUBLIC_GO_WEB_BUILD_TIME: "${GO_WEB_BUILD_TIME:-unknown}"
    networks:
      - im-go-net

  go-outbox-worker:
    <<: *go-service
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        TARGET_CMD: outbox-worker
    image: "${GO_OUTBOX_WORKER_IMAGE:-im-go-outbox-worker:${GO_IMAGE_TAG:-latest}}"
    environment:
      <<: *go-env
      CLOUD_RUNTIME_ROLE: outbox_worker

  go-incoming-worker:
    <<: *go-service
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        TARGET_CMD: incoming-worker
    image: "${GO_INCOMING_WORKER_IMAGE:-im-go-incoming-worker:${GO_IMAGE_TAG:-latest}}"
    environment:
      <<: *go-env
      CLOUD_RUNTIME_ROLE: incoming_worker

  go-contact-sync-worker:
    <<: *go-service
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        TARGET_CMD: contact-sync-worker
    image: "${GO_CONTACT_SYNC_WORKER_IMAGE:-im-go-contact-sync-worker:${GO_IMAGE_TAG:-latest}}"
    environment:
      <<: *go-env
      CLOUD_RUNTIME_ROLE: contact_sync_worker

  go-send-dispatcher:
    <<: *go-service
    depends_on:
      go-redis:
        condition: service_healthy
      go-cache-redis:
        condition: service_healthy
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        TARGET_CMD: send-dispatcher
    image: "${GO_SEND_DISPATCHER_IMAGE:-im-go-send-dispatcher:${GO_IMAGE_TAG:-latest}}"
    environment:
      <<: *go-env
      CLOUD_RUNTIME_ROLE: send_dispatcher
      GO_SEND_CONNECTOR_MODE: "${GO_SEND_CONNECTOR_MODE:-}"
      GO_SEND_CONNECTOR_BASE_URL: "${GO_SEND_CONNECTOR_BASE_URL:-${GO_SEND_PROVIDER_BASE_URL:-}}"
      GO_SEND_CONNECTOR_API_TOKEN: "${GO_SEND_CONNECTOR_API_TOKEN:-${GO_SEND_PROVIDER_API_TOKEN:-}}"
      GO_SEND_CONNECTOR_TIMEOUT_SEC: "${GO_SEND_CONNECTOR_TIMEOUT_SEC:-${GO_SEND_PROVIDER_TIMEOUT_SEC:-180}}"
      GO_SEND_PROVIDER_BASE_URL: "${GO_SEND_PROVIDER_BASE_URL:-}"
      GO_SEND_PROVIDER_API_TOKEN: "${GO_SEND_PROVIDER_API_TOKEN:-}"
      GO_SEND_PROVIDER_TIMEOUT_SEC: "${GO_SEND_PROVIDER_TIMEOUT_SEC:-180}"

  go-archive-sync-worker:
    <<: *go-service
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        TARGET_CMD: archive-sync-worker
    image: "${GO_ARCHIVE_SYNC_WORKER_IMAGE:-im-go-archive-sync-worker:${GO_IMAGE_TAG:-latest}}"
    environment:
      <<: *go-env
      CLOUD_RUNTIME_ROLE: archive_sync_worker

  go-archive-ingest-worker:
    <<: *go-service
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        TARGET_CMD: archive-ingest-worker
    image: "${GO_ARCHIVE_INGEST_WORKER_IMAGE:-im-go-archive-ingest-worker:${GO_IMAGE_TAG:-latest}}"
    environment:
      <<: *go-env
      CLOUD_RUNTIME_ROLE: archive_ingest_worker

  go-archive-media-worker:
    <<: *go-service
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        TARGET_CMD: archive-media-worker
    image: "${GO_ARCHIVE_MEDIA_WORKER_IMAGE:-im-go-archive-media-worker:${GO_IMAGE_TAG:-latest}}"
    environment:
      <<: *go-env
      CLOUD_RUNTIME_ROLE: archive_media_worker

  go-voice-transcription-worker:
