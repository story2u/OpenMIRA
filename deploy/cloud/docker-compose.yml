        TARGET_CMD: voice-transcription-worker
    image: "${GO_VOICE_TRANSCRIPTION_WORKER_IMAGE:-im-go-voice-transcription-worker:${GO_IMAGE_TAG:-latest}}"
    environment:
      <<: *go-env
      CLOUD_RUNTIME_ROLE: voice_transcription_worker

