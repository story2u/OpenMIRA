name: im-go

x-api-env: &api-env
  IM_API_ADDR: ":9000"
  IM_DATABASE_URL: "${IM_DATABASE_URL:-postgres://im:${POSTGRES_PASSWORD:-im-dev-password}@go-postgres:5432/im?sslmode=disable}"
  IM_AUTO_MIGRATE: "${IM_AUTO_MIGRATE:-true}"
  IM_SEED_DATA: "${IM_SEED_DATA:-true}"

services:
  go-postgres:
    image: "${POSTGRES_IMAGE:-postgres:16-alpine}"
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-im}"
      POSTGRES_USER: "${POSTGRES_USER:-im}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-im-dev-password}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - go-postgres-data:/var/lib/postgresql/data
    networks:
      - im-go-net

  go-api:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        TARGET_CMD: api
    image: "${GO_API_IMAGE:-im-api:${GO_IMAGE_TAG:-latest}}"
    restart: unless-stopped
    depends_on:
      go-postgres:
        condition: service_healthy
    environment:
      <<: *api-env
    ports:
      - "${GO_API_BIND_ADDR:-127.0.0.1}:${GO_API_HOST_PORT:-19000}:9000"
    networks:
      - im-go-net

  go-web:
    build:
      context: ../web
      dockerfile: Dockerfile
      args:
        IM_API_INTERNAL_BASE_URL: "${IM_API_INTERNAL_BASE_URL:-http://go-api:9000}"
    image: "${GO_WEB_IMAGE:-im-web:${GO_IMAGE_TAG:-latest}}"
    restart: unless-stopped
    depends_on:
      - go-api
    environment:
      IM_API_INTERNAL_BASE_URL: "${IM_API_INTERNAL_BASE_URL:-http://go-api:9000}"
    ports:
      - "${GO_WEB_BIND_ADDR:-127.0.0.1}:${GO_WEB_HOST_PORT:-18080}:3000"
    networks:
      - im-go-net

  cloudflared:
    image: "${CLOUDFLARED_IMAGE:-cloudflare/cloudflared:latest}"
    restart: unless-stopped
    command: ["tunnel", "--no-autoupdate", "run", "--token", "${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN is required}"]
    depends_on:
      - go-api
      - go-web
    networks:
      - im-go-net

volumes:
  go-postgres-data:

networks:
  im-go-net:
