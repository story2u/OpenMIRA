name: OpportunityRadar
options:
  bundleIdPrefix: com.codeiy
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1"
targets:
  OpportunityRadar:
    type: application
    platform: iOS
    sources:
      - App
      - Core
      - Features
      - Models
      - Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codeiy.im
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: OpportunityRadar.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "2026071202"
        GENERATE_INFOPLIST_FILE: NO
  OpportunityRadarTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: OpportunityRadar
